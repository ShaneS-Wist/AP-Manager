<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Invoice Dashboards</title>
<style>
  :root { --band:#0c1a22; --band2:#112232; --txt:#fff; --accent:#22c55e; --muted:#6e9aad; --danger:#e74c3c; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { display:flex; flex-direction:column; height:100vh; overflow:hidden;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--band); }
  /* ── LOGIN GATE ── */
  .login-overlay { position:fixed; inset:0; background:var(--band); z-index:9999;
    display:flex; align-items:center; justify-content:center; }
  .login-overlay.hidden { display:none; }
  .login-box { background:var(--band2); padding:32px 28px; border-radius:16px; width:340px; max-width:90vw; }
  .login-box h2 { color:var(--txt); margin:0 0 6px; font-size:20px; }
  .login-box p { color:var(--muted); margin:0 0 20px; font-size:13px; line-height:1.5; }
  .login-box label { display:block; color:var(--muted); font-size:12px; font-weight:600; margin-bottom:5px; }
  .login-box input { width:100%; padding:10px 12px; border:1.5px solid rgba(255,255,255,.12);
    border-radius:8px; background:rgba(255,255,255,.06); color:var(--txt); font-size:14px;
    font-family:inherit; outline:none; margin-bottom:14px; }
  .login-box input:focus { border-color:var(--accent); }
  .login-box button { width:100%; padding:12px; background:var(--accent); color:#fff; border:none;
    border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .login-box button:disabled { opacity:.5; cursor:wait; }
  .login-err { color:var(--danger); font-size:12px; margin-top:8px; display:none; }
  .login-user { color:var(--muted); font-size:12px; text-align:right; padding:4px 12px 0; }
  /* ── TABS ── */
  .dash-tabs { flex:0 0 auto; display:flex; align-items:stretch; gap:4px;
               background:var(--band); padding:6px 8px 0; }
  .dtab { appearance:none; border:none; cursor:pointer; color:var(--muted);
          background:var(--band2); border-radius:10px 10px 0 0; padding:11px 18px;
          font-size:14px; font-weight:700; letter-spacing:.2px; transition:all .12s; }
  .dtab:hover { color:var(--txt); }
  .dtab.on { color:var(--band); background:#fff; }
  .dash-stage { flex:1 1 auto; position:relative; background:#cddde9; }
  .dframe { position:absolute; inset:0; width:100%; height:100%; border:none; display:none; }
  .dframe.on { display:block; }
  .dash-app { display:none; } /* hide tabs+stage until logged in */
  .dash-app.on { display:flex; flex-direction:column; flex:1; }
</style>
</head>
<body>

<!-- LOGIN GATE -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>Invoice Dashboards</h2>
    <p>Enter your GitHub username and personal access token. Your browser will offer to save these for next time.</p>
    <form id="loginForm" autocomplete="on">
      <label for="loginUser">Username</label>
      <input type="text" id="loginUser" name="username" autocomplete="username" placeholder="GitHub username" required>
      <label for="loginToken">API Token</label>
      <input type="password" id="loginToken" name="password" autocomplete="current-password" placeholder="ghp_…" required>
      <button type="submit" id="loginBtn">Sign In</button>
      <div class="login-err" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- APP (hidden until login) -->
<div class="dash-app" id="dashApp">
  <div style="display:flex;align-items:center;background:var(--band);padding-right:12px;">
    <div class="dash-tabs" style="flex:1">
    <button class="dtab on" data-app="isg" onclick="showApp('isg')">ISG Invoices</button>
    <button class="dtab" data-app="hon" onclick="showApp('hon')">HON Invoices</button>
    <button class="dtab" data-app="spr" onclick="showApp('spr')">SPR Exceptions</button>
    </div>
    <div class="login-user" id="userLabel"></div>
  </div>
  <div class="dash-stage" id="stage"></div>
</div>

<script type="text/html" id="tpl-isg"><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISG Invoice Tracker</title>
<style>
:root{
  --ink:#152535;--ink2:#3a5070;--ink3:#7090a8;
  --surface:#cddde9;--card:#deeaf4;--border:#a8c4d8;
  --accent:#16a34a;--adim:#d4f0e2;
  --open:#f59e0b;--odim:#fef3c7;
  --ready:#1a6b42;--rdim:#c2e8d4;
  --credit:#7c3aed;--cdim:#ede9fe;
  --danger:#dc2626;--ddim:#fee2e2;
  --paid:#6b7280;--pdim:#f3f4f6;
  --r:12px;--rs:8px;
  --font:system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--surface);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

.topbar{background:var(--ink);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-weight:800;font-size:15px;letter-spacing:-.3px}.brand span{color:#60a5fa}
.topbar-r{display:flex;gap:8px}
.btn-icon{background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#fff;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:background .15s}
.btn-icon:hover{background:rgba(255,255,255,.2)}.btn-icon.on{background:var(--accent)}
.mgmt-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;padding:0 12px;height:34px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:background .15s}
.mgmt-btn:hover{background:rgba(255,255,255,.25)}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.sc{background:var(--card);padding:10px 8px;text-align:center;cursor:pointer;transition:background .15s}
.sc:hover{background:var(--surface)}.sc.on{background:var(--adim)}
.sn{font-size:18px;font-weight:800;letter-spacing:-.5px;line-height:1}
.sl{font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.no{color:var(--open)}.nr{color:var(--ready)}.nc{color:var(--credit)}.nd{color:var(--danger)}

.filters{background:var(--card);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fsel{flex:1;min-width:100px;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:12px;font-weight:600;background:var(--card);color:var(--ink);cursor:pointer;outline:none;font-family:var(--font);transition:border-color .15s;height:30px}
.fsel:focus,.fsel.on{border-color:var(--accent);background:var(--adim);color:var(--accent)}
.drange{display:flex;gap:4px;align-items:center;flex:2;min-width:180px}
.drange input{flex:1;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:11px;background:var(--card);color:var(--ink);outline:none;font-family:var(--font);height:30px}
.drange input:focus{border-color:var(--accent)}
.drange span{font-size:11px;color:var(--ink3);white-space:nowrap}
.clrbtn{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:11px;font-weight:700;background:var(--card);color:var(--ink2);cursor:pointer;font-family:var(--font);white-space:nowrap;height:30px}
.clrbtn:hover{background:var(--ddim);border-color:var(--danger);color:var(--danger)}

.chips{background:var(--card);border-bottom:1px solid var(--border);padding:5px 14px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center}
.chips::-webkit-scrollbar{display:none}
.chips-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;margin-right:2px}
.chip{border:1.5px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--ink2);transition:all .15s;user-select:none;line-height:1.6}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.on{color:#fff}
.chip.co.on{background:var(--open);border-color:var(--open)}
.chip.cr.on{background:var(--ready);border-color:var(--ready)}
.chip.cc.on{background:var(--credit);border-color:var(--credit)}
.chip.cd.on{background:var(--danger);border-color:var(--danger)}
.chip.cf.on{background:var(--danger);border-color:var(--danger)}
.chip.ct.on{background:var(--accent);border-color:var(--accent)}

.toolbar{padding:6px 14px;display:flex;gap:8px;align-items:center;background:var(--surface)}
.sw{flex:1;position:relative}
.sw input{width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;background:var(--card);color:var(--ink);outline:none;font-family:var(--font)}
.sw input:focus{border-color:var(--accent)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:14px;pointer-events:none}
.sortsel{padding:8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:12px;font-weight:600;background:var(--card);color:var(--ink2);cursor:pointer;outline:none;font-family:var(--font)}

.tabs{display:flex;padding:0 14px;border-bottom:2px solid var(--border);background:var(--card)}
.tab{padding:10px 14px;font-size:13px;font-weight:600;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;user-select:none}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}

.list{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:13px 14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.card.sO::before{background:var(--open)}.card.sR::before{background:var(--ready)}
.card.sC::before{background:var(--credit)}.card.sP::before{background:var(--paid)}
.card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(26,31,46,.1);transform:translateY(-1px)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.flag-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-right:6px;flex-shrink:0;vertical-align:middle}
.amt-wrap{display:flex;align-items:center}
.cid{font-family:var(--mono);font-size:12px;font-weight:700}
.camt{font-size:15px;font-weight:800;white-space:nowrap}.camt.neg{color:var(--credit)}
.csup{font-size:12px;color:var(--ink2);margin-bottom:5px;font-weight:500}
.cmeta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bO{background:var(--odim);color:#92400e}.bR{background:var(--rdim);color:#065f46}
.bC{background:var(--cdim);color:#5b21b6}.bP{background:var(--pdim);color:var(--paid)}
.bD{background:var(--ddim);color:#991b1b}.bDue{background:var(--adim);color:#1e40af}
.cbuy{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink3)}
.vchk,.vx{margin-left:6px;display:inline-flex;align-items:center;gap:4px;font-size:11px}
.vdiff{font-size:10px;font-weight:700;color:var(--danger);background:var(--ddim);padding:1px 5px;border-radius:8px;white-space:nowrap}
.cdv{margin-left:3px;font-size:9px}
.empty{text-align:center;padding:48px 24px;color:var(--ink3)}
.empty .ei{font-size:40px;margin-bottom:12px}
.empty h3{font-size:15px;color:var(--ink2);margin-bottom:6px}

/* CALENDAR */
.calview{padding:12px 14px}
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.caltitle{font-size:16px;font-weight:700}
.calnav{background:none;border:1.5px solid var(--border);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;color:var(--ink2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.calnav:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdh{text-align:center;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;padding:4px 0;letter-spacing:.5px}
.cd{min-height:72px;border-radius:8px;background:var(--card);border:1.5px solid transparent;padding:4px;cursor:pointer;transition:all .15s}
.cd.om{background:transparent;cursor:default}.cd.today{border-color:var(--accent);background:var(--adim)}
.cd:not(.om):hover{border-color:var(--accent)}
.cdn{font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:2px}.cd.today .cdn{color:var(--accent)}
.cddots{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px}
.dchip{display:inline-flex;align-items:center;justify-content:center;min-width:14px;height:14px;padding:0 3px;border-radius:7px;font-size:9px;font-weight:700;color:#fff;line-height:1}
.dO{background:var(--open)}.dR{background:var(--ready)}.dC{background:var(--credit)}.dD{background:var(--danger)}.dP{background:var(--paid)}
.cdnet{font-size:9px;font-weight:800;color:var(--ink2);line-height:1.2;margin-top:1px}
.cdnet.ov{color:var(--danger)}
.cdnet.negnet{color:var(--credit)}

/* DAY POPUP */
.dpop-ov{position:fixed;inset:0;background:rgba(26,31,46,.45);z-index:150;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .15s}
.dpop-ov.on{opacity:1;pointer-events:all}
.dpop{background:var(--card);border-radius:var(--r);box-shadow:0 8px 32px rgba(26,31,46,.18);width:100%;max-width:420px;max-height:72vh;display:flex;flex-direction:column}
.dpop-h{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dpop-title{font-size:14px;font-weight:700}.dpop-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.dpop-x{background:var(--surface);border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.dpop-list{padding:8px;overflow-y:auto;flex:1}
.dpop-item{padding:10px 12px;border-radius:var(--rs);border:1.5px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center;gap:8px}
.dpop-item:hover{border-color:var(--accent);background:var(--adim)}
.dpi-id{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:2px}
.dpi-sup{font-size:12px;font-weight:600;color:var(--ink)}
.dpi-amt{font-size:13px;font-weight:800;text-align:right}.dpi-amt.neg{color:var(--credit)}
.dpi-buy{font-size:10px;color:var(--ink3);text-align:right;margin-top:2px}
.dpop-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;color:var(--ink2);flex-shrink:0}
.dpop-tot{font-size:14px;font-weight:800;color:var(--ink)}
.dpop-group-hdr{padding:6px 12px 2px;font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px;border-top:1px solid var(--border);margin-top:4px}
.dpop-group-hdr:first-child{border-top:none;margin-top:0}
.dpop-subtotal{padding:4px 12px 8px;font-size:11px;font-weight:700;color:var(--ink2);display:flex;justify-content:flex-end;gap:12px;border-bottom:1.5px solid var(--border);margin-bottom:6px}
.dpop-subtotal span{white-space:nowrap}
.dpop-subtotal .sub-label{color:var(--ink3);font-weight:600}
.dpop-tot.negnet{color:var(--credit)}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(26,31,46,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mov.on{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);padding-bottom:16px}
.mov.on .modal{transform:translateY(0)}
.mhandle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.mhead{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mid{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.5px;margin-bottom:2px}
.msup{font-size:16px;font-weight:800;color:var(--ink)}
.mamt{font-size:20px;font-weight:900;white-space:nowrap}.mamt.neg{color:var(--credit)}
.mx{background:var(--surface);border:none;border-radius:50%;width:30px;height:30px;font-size:17px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mx:hover{background:var(--ddim);color:var(--danger)}
.mbody{padding:14px 18px}
.arow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.abtn{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;border:none;text-decoration:none;transition:all .15s;font-family:var(--font)}
.apdf{background:var(--accent);color:#fff}.apdf:hover{background:#1d4ed8}
.adoc{background:var(--surface);color:var(--ink);border:1.5px solid var(--border)}.adoc:hover{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.ahint{font-size:11px;color:var(--ink3);text-align:center;margin-bottom:14px;line-height:1.4}
.fsec{margin-bottom:14px}
.ftitle{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:8px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ic{background:var(--surface);border-radius:var(--rs);padding:9px 11px}
.icl{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.icv{font-size:13px;font-weight:600;color:var(--ink)}.icv.mono{font-family:var(--mono);font-size:11px}
.icv.ov{color:var(--danger)}.icv.ok{color:var(--ready)}
.stctl{margin-bottom:14px}
.stlbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ink3);margin-bottom:8px}
.stopts{display:flex;gap:6px}
.stopt{flex:1;padding:9px 6px;border-radius:var(--rs);border:2px solid var(--border);text-align:center;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;background:var(--card);color:var(--ink2);user-select:none}
.stopt:hover{border-color:var(--ink2)}
.stopt.sO{border-color:var(--open);background:var(--odim);color:#92400e}
.stopt.sR{border-color:var(--ready);background:var(--rdim);color:#065f46}
.stopt.sC{border-color:var(--credit);background:var(--cdim);color:#5b21b6}
.stopt.sP{border-color:var(--paid);background:var(--pdim);color:var(--paid)}
.stopt.flag-active{border-color:var(--danger);background:var(--ddim);color:#991b1b}
.buyer-sel{width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:12px;font-weight:600;background:var(--card);color:var(--ink);outline:none;font-family:var(--mono);transition:border-color .15s}
.buyer-sel:focus{border-color:var(--accent)}
.buyer-sel.invalid{border-color:var(--danger);background:var(--ddim)}
.ntxt{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:var(--font);color:var(--ink);resize:none;min-height:44px;outline:none;transition:border-color .15s;background:var(--card)}
.ntxt:focus{border-color:var(--accent)}
.note-log{max-height:180px;overflow-y:auto;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
.note-entry{background:var(--bg);border-radius:var(--rs);padding:8px 10px;font-size:12.5px;line-height:1.45}
.note-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600}
.note-text{color:var(--ink)}
.note-empty{color:var(--muted);font-size:12px;font-style:italic;padding:8px 0}
.note-add{display:flex;gap:6px;align-items:flex-start}
.note-add .ntxt{flex:1;min-height:44px}
.note-add button{flex:0 0 auto;padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer}

.tag-add-btn{padding:3px 10px;border:1.5px dashed var(--border);border-radius:var(--rs);font-size:11px;color:var(--ink3);cursor:pointer;background:none;font-family:var(--font)}
.tag-add-btn:hover{border-color:var(--accent);color:var(--accent)}

.mgmt-ov{position:fixed;inset:0;background:rgba(26,31,46,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}

<script>
const SP_DOCS = 'https://wistoffice.sharepoint.com/sites/AP-Overview/Shared%20Documents/ISG%20Invoices';
let KNOWN_BUYERS = ['CCAPAS','CHRISH','KELLYL','MBERGWE','SSARINA','TBENEDE','TREVOR'];

// ── GITHUB DATA STORE ────────────────────────────────────────────
const GH_USER  = 'ShaneS-Wist';
const GH_REPO  = 'isg-data';
const GH_FILE  = 'invoices.json';
let GH_TOKEN = ''; // set by login gate
let APP_USER = ''; // GitHub username, set by login gate
let APP_NAME = ''; // Display name from profiles repo
let APP_EMAIL = ''; // Email from profiles repo
let APP_PROFILES = [];

// ── EMAIL NOTIFICATION (Power Automate) ────────────────────────────
const FLOW_URL = 'https://default9f4f877906c047fdbc57f13ddf261c.04.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/bb65c0fcfbc54028964505231b9b385e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=mxNhYPqhXIJmjvV7zQ9ZtvMsWtLTMhaRUkHKoJMKRVU';

function sendNotifyEmail(row, triggerType){
  const emails=(row.notifyEmails||[]).concat([row.notifyEmail1,row.notifyEmail2]).filter(Boolean);
  var unique=[]; emails.forEach(function(e){if(unique.indexOf(e)===-1)unique.push(e);});
  if(!unique.length) return;
  const payload = {
    to: unique.join(';'),
    buyerCode: row.buyer||'',
    invoiceId: row.id,
    pdfPath: pdfWindowsPath(row.id),
    note: (Array.isArray(row.notes) && row.notes.length) ? row.notes[row.notes.length-1].text + ' —' + row.notes[row.notes.length-1].by : '(no note)',
    trigger: triggerType,
    app: 'ISG',
    link: 'https://shanes-wist.github.io/AP-Dashboard/#app=isg&id=' + row.id
  };
  fetch(FLOW_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(()=>{
    showToast('📧 Notification sent');
  }).catch(e=>{
    console.log('Notify failed:', e);
    showToast('Notify failed — check connection');
  });
}
const GH_API   = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

let ghSha = null; // current file SHA — required for updates
let baseSnap = {}; // id -> canonical JSON of each record as last loaded/saved (merge baseline)

// Canonical, key-order-independent stringify for a flat record
function canon(o){
  if(o===null||typeof o!=='object') return JSON.stringify(o);
  if(Array.isArray(o)) return '['+o.map(canon).join(',')+']';
  return '{'+Object.keys(o).sort().map(k=>JSON.stringify(k)+':'+canon(o[k])).join(',')+'}';
}
// Build {id: canonical} snapshot from a flat list of records
function snapshot(records){ const m={}; records.forEach(r=>{ if(r && r.id!=null) m[String(r.id)]=canon(r); }); return m; }
// ISG: a record lives in PAID when its status is Paid or Credited
function isPaidStatus(s){ return s==='Paid' || s==='Credited'; }

// Fetch the current remote file, handling the >1MB raw fallback. Returns {sha, content}.
async function ghFetch(){
  const metaResp = await fetch(GH_API, { cache:'no-store', headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3+json' } });
  if(!metaResp.ok) throw new Error(`GitHub ${metaResp.status}: ${await metaResp.text()}`);
  const meta = await metaResp.json();
  let content;
  if(meta.content && meta.encoding==='base64'){
    content = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g,'')))));
  } else {
    const raw = await fetch(GH_API, { cache:'no-store', headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3.raw' } });
    if(!raw.ok) throw new Error(`GitHub raw ${raw.status}: ${await raw.text()}`);
    content = JSON.parse(await raw.text());
  }
  return { sha: meta.sha, content };
}
// PUT a JSON payload with the given sha. Returns the raw Response (so caller can detect 409 without throwing).
async function ghPut(jsonStr, sha){
  const content = btoa(unescape(encodeURIComponent(jsonStr)));
  return fetch(GH_API, {
    method:'PUT',
    headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' },
    body: JSON.stringify({ message:`Update invoices ${new Date().toISOString().split('T')[0]}`, content, sha })
  });
}

async function loadFromGitHub() {
  showBanner('Loading invoices…', 'info');
  try {
    const metaResp = await fetch(GH_API, {
      headers: {
        'Authorization': `token ${GH_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    if (!metaResp.ok) throw new Error(`GitHub ${metaResp.status}: ${await metaResp.text()}`);
    const meta = await metaResp.json();
    ghSha = meta.sha;

    let content;
    if (meta.content && meta.encoding === 'base64') {
      // File is under 1MB — standard base64 content is usable directly
      content = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, '')))));
    } else {
      // File is over 1MB — GitHub omits content here, fetch raw instead
      const rawResp = await fetch(GH_API, {
        cache: 'no-store',
        headers: {
          'Authorization': `token ${GH_TOKEN}`,
          'Accept': 'application/vnd.github.v3.raw'
        }
      });
      if (!rawResp.ok) throw new Error(`GitHub raw ${rawResp.status}: ${await rawResp.text()}`);
      const rawText = await rawResp.text();
      content = JSON.parse(rawText);
    }
    ACTIVE = content.active || [];
    PAID   = content.paid   || [];
    if (ACTIVE.length === 0 && PAID.length === 0 && content.active === undefined) {
      console.error('GitHub response had no "active"/"paid" fields. Keys found:', Object.keys(content || {}));
      throw new Error('Fetched data missing expected fields — open browser console (F12) for details');
    }
    if(content.knownBuyers && content.knownBuyers.length) KNOWN_BUYERS = content.knownBuyers;
    baseSnap = snapshot([...ACTIVE, ...PAID]);
    refreshFilterOptions();
    render();
    showBanner(`Loaded ${ACTIVE.length} active, ${PAID.length} paid`, 'ok');
    if(pendingDeepLink){var _dl=pendingDeepLink;pendingDeepLink=null;setTimeout(function(){openM(_dl);},150);}
  } catch(e) {
    showBanner('Load failed: ' + e.message, 'err');
  }
}

async function saveToGitHub() {
  showBanner('Saving…', 'info');
  const btn = $('ghSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    // Our current local state, keyed by id
    const ours = {};
    [...ACTIVE, ...PAID].forEach(r => { if (r && r.id != null) ours[String(r.id)] = r; });

    // Re-fetch remote and merge just before writing; retry if someone writes in the gap (409)
    for (let attempt = 0; attempt < 3; attempt++) {
      const { sha, content } = await ghFetch();
      const theirs = {};
      [...(content.active || []), ...(content.paid || [])].forEach(r => { if (r && r.id != null) theirs[String(r.id)] = r; });

      const ids = new Set([...Object.keys(baseSnap), ...Object.keys(ours), ...Object.keys(theirs)]);
      const merged = [];
      const conflicts = [];
      ids.forEach(id => {
        const b = baseSnap[id];                       // canonical at load (undefined if not present then)
        const o = ours[id], t = theirs[id];
        const oc = o ? canon(o) : undefined;          // ours canonical (undefined = we deleted/never had)
        const tc = t ? canon(t) : undefined;          // theirs canonical
        const ourChanged   = oc !== b;
        const theirChanged = tc !== b;
        if (!ourChanged)   { if (t) merged.push(t); return; }  // we didn't touch it → accept their copy/delete
        if (!theirChanged) { if (o) merged.push(o); return; }  // they didn't touch it → keep ours/our delete
        if (oc === tc)     { if (o) merged.push(o); return; }  // both made the identical change
        // Both changed — try notes-aware reconciliation: merge notes arrays, compare the rest
        if (o && t) {
          const oRest = {...o, notes: []}; const tRest = {...t, notes: []};
          if (canon(oRest) === canon(tRest)) {
            // Only notes differ — union-merge notes
            const bNotes = b ? (JSON.parse(b).notes || []) : [];
            const result = {...o, notes: mergeNotes(bNotes, o.notes||[], t.notes||[])};
            merged.push(result); return;
          }
        }
        conflicts.push(id);                                    // genuine same-row conflict
      });

      if (conflicts.length) {
        const list = conflicts.slice(0, 8).join(', ') + (conflicts.length > 8 ? '…' : '');
        showBanner(`Save blocked — ${conflicts.length} invoice(s) were changed by someone else since you loaded: ${list}. Reload to pull the latest, then re-apply your edits.`, 'err');
        if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
        return;
      }

      // Reconstruct the two arrays from status, and union the known-buyer list (it only grows)
      const newActive = [], newPaid = [];
      merged.forEach(r => { (isPaidStatus(r.status) ? newPaid : newActive).push(r); });
      const mergedBuyers = [...new Set([...(content.knownBuyers || []), ...(KNOWN_BUYERS || [])])];

      const payload = JSON.stringify({ active: newActive, paid: newPaid, knownBuyers: mergedBuyers });
      const put = await ghPut(payload, sha);
      if (put.status === 409) continue;               // remote moved under us — retry merge with fresh sha
      if (!put.ok) throw new Error(`GitHub ${put.status}: ${await put.text()}`);

      const result = await put.json();
      ghSha = result.content.sha;
      ACTIVE = newActive; PAID = newPaid; KNOWN_BUYERS = mergedBuyers;
      baseSnap = snapshot([...ACTIVE, ...PAID]);
      hasUnsavedChanges = false; updateSaveBtn();
      refreshFilterOptions(); render();
      showBanner('Saved ✓', 'ok');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
      return;
    }
    showBanner('Save failed: too many concurrent edits in a row — please try again.', 'err');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
  } catch(e) {
    showBanner('Save failed: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
  }
}

function showBanner(msg, type) {
  const el = $('ghBanner');
  el.textContent = msg;
  el.style.background = type === 'ok' ? 'var(--ready)' : type === 'err' ? 'var(--danger)' : 'var(--accent)';
  el.style.display = 'block';
  if (type === 'ok') setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ── NOTE LOG HELPERS ─────────────────────────────────────────────
// Notes are now an array of {text, by, at} entries.
// Migrate old flat strings: discard per spec (don't migrate).
function ensureNoteArray(record){
  if(!Array.isArray(record.notes)) record.notes = [];
}
function renderNoteLog(notes){
  const el=$('noteLog'); if(!el)return;
  const arr=Array.isArray(notes)?notes:[];
  if(!arr.length){ el.innerHTML='<div class="note-empty">No notes yet</div>'; return; }
  // newest on top
  const sorted=[...arr].sort((a,b)=>new Date(b.at)-new Date(a.at));
  el.innerHTML=sorted.map(n=>{
    const d=new Date(n.at);
    const ds=isNaN(d)?n.at:d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const who=n.by||'Unknown';
    const txt=(n.text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="note-entry"><div class="note-meta"><span>${who}</span><span>${ds}</span></div><div class="note-text">${txt}</div></div>`;
  }).join('');
}

// ── TAGS ──────────────────────────────────────────────────────────
let editTags=[];
function getAllRecords(){return [...ACTIVE,...PAID];}
function getAppTags(){
  var all=getAllRecords(),map={};
  all.forEach(function(r){(r.tags||[]).forEach(function(t){map[t.name]=t.color;});});
  return Object.keys(map).map(function(n){return {name:n,color:map[n]};});
}
function renderTagPills(){
  $('tagPills').innerHTML=editTags.map(function(t,i){
    return '<span class="tag-pill" style="background:'+t.color+'">'+t.name+'<span class="tag-x" onclick="removeEditTag('+i+')">&times;</span></span>';
  }).join('');
}
function removeEditTag(i){editTags.splice(i,1);renderTagPills();}
function openTagPop(){switchTagTab('select');$('tagPopBg').classList.add('on');$('tagPop').classList.add('on');}
function closeTagPop(){$('tagPopBg').classList.remove('on');$('tagPop').classList.remove('on');}
function switchTagTab(which){
  $('tagTabSel').classList.toggle('on',which==='select');
  $('tagTabNew').classList.toggle('on',which==='create');

// Merge helper: notes arrays are union-merged by deduplicating on by+at+text
function mergeNotes(base, ours, theirs){
  const key=e=>`${e.by}|${e.at}|${e.text}`;
  const seen=new Set();
  const all=[...(base||[]),...(ours||[]),...(theirs||[])];
  const merged=[];
  all.forEach(e=>{ const k=key(e); if(!seen.has(k)){seen.add(k);merged.push(e);} });
  return merged.sort((a,b)=>new Date(a.at)-new Date(b.at));
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=c;
    }
    vals.push(cur.trim());
    const row={};
    headers.forEach((h,i)=>row[h]=vals[i]||'');
    return row;
  });
}

function parseMoney(v){
  if(v===null||v===undefined||v==='')return 0;
  const s=String(v).replace(/[$,\s()]/g,'');
  const neg=String(v).trim().startsWith('(')||String(v).trim().startsWith('-');
  const n=parseFloat(s.replace(/^-/,''))||0;
  return neg?-n:n;
}

function calcOverdue(dueDateStr){
  if(!dueDateStr)return 0;
  const due=new Date(dueDateStr+'T00:00:00');
  const t=new Date(); t.setHours(0,0,0,0);
  return due<t?Math.floor((t-due)/86400000):0;
}

function normalizeDate(s){
  if(!s)return'';
  // Handle M/D/YYYY -> YYYY-MM-DD
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  if(s.match(/^\d{4}-\d{2}-\d{2}$/))return s;
  return s;
}

let pendingXlsx=null;

function xlsxKey(id){return String(id||'').replace(/^000/,'').replace(/-IN$/i,'').trim();}
function getXlsxMatch(r){
  if(!xlsxInvoices)return null;
  if(isPaidStatus(r.status))return null;
  return xlsxInvoices[xlsxKey(r.id)]||null;
}
function verifyDiffs(r,m){
  const tol=0.005;
  // Diffs are S2K value minus the app's (target) value, so e.g. an S2K
  // discount that's $0.02 too high shows as Disc +$0.02.
  const dAmt=Math.round((m.amt-r.amt)*100)/100;
  const dDisc=Math.round((m.disc-r.discount)*100)/100;
  const dNet=Math.round((m.net-r.net)*100)/100;
  return {dAmt,dDisc,dNet,ok:Math.abs(dAmt)<tol&&Math.abs(dDisc)<tol&&Math.abs(dNet)<tol};
}
function verifyBadge(r){
  const m=getXlsxMatch(r);
  if(!m)return '';
  const v=verifyDiffs(r,m);
  if(v.ok)return '<span class="vchk" title="Matches S2K export">✅</span>';
  const parts=[];
  if(Math.abs(v.dAmt)>=0.005)parts.push('Amt '+(v.dAmt>0?'+$':'-$')+Math.abs(v.dAmt).toFixed(2));
  if(Math.abs(v.dDisc)>=0.005)parts.push('Disc '+(v.dDisc>0?'+$':'-$')+Math.abs(v.dDisc).toFixed(2));
  if(Math.abs(v.dNet)>=0.005)parts.push('Net '+(v.dNet>0?'+$':'-$')+Math.abs(v.dNet).toFixed(2));
  return '<span class="vx" title="Mismatch vs S2K export">❌<span class="vdiff">'+parts.join(' · ')+'</span></span>';
}
function dayVerifyIcon(inv){
  const matched=inv.filter(r=>getXlsxMatch(r));
  if(!matched.length)return '';

  return '<span class="cdv" title="S2K verification">'+(anyBad?'❌':'✅')+'</span>';
}

function runVerify(){
  if(!pendingXlsx){return;}
  const map={};
  pendingXlsx.forEach(row=>{
    const vi=String(row['Vendor Invoice']||'').trim();
    if(!vi)return;
    const amt=parseMoney(row['Invoice Amount']);
    // Credit Memo adds to the discount total (positive there) and so also
    // flows through into net as a reduction (negative there), since net = amt - disc.
    // Debit Memo is the mathematical inverse of Credit Memo.
    const disc=parseMoney(row['Discount Amount'])+parseMoney(row['Credit Memo'])-parseMoney(row['Debit Memo']);
    if(!map[vi])map[vi]={amt:0,disc:0,count:0};
    map[vi].amt+=amt;map[vi].disc+=disc;map[vi].count++;
  });
  Object.keys(map).forEach(k=>{
    map[k].amt=Math.round(map[k].amt*100)/100;
    map[k].disc=Math.round(map[k].disc*100)/100;
    map[k].net=Math.round((map[k].amt-map[k].disc)*100)/100;
  });
  xlsxInvoices=map;
  $('clearVerifyBtn').disabled=false;
  render();
  log('verifyLog',`✓ Verification loaded — ${Object.keys(map).length} unique invoice numbers ready for matching.`);
  showToast('Verification loaded');
}

function buildBuyerMap(buyerRows){
  // Buyers.csv has PAPO, PACCTU columns (or unnamed 0,1)
  const byKey={};
  const newBuyersFound=new Set();
  buyerRows.forEach(row=>{
    const po=row.PAPO||row['0']||Object.values(row)[0]||'';
    const buyr=(row.PACCTU||row['1']||Object.values(row)[1]||'').trim().toUpperCase();
    if(!po||!buyr||po==='PAPO')return;
    const digits=po.replace(/\D/g,'');
    if(digits.length<1)return;
    const key=digits.slice(-7);
    if(!byKey[key])byKey[key]=[];
    byKey[key].push({fullDigits:digits,buyer:buyr});
    if(!KNOWN_BUYERS.includes(buyr)) newBuyersFound.add(buyr);
  });
  if(newBuyersFound.size>0){
    KNOWN_BUYERS=[...new Set([...KNOWN_BUYERS,...newBuyersFound])].sort();
    log('importLog',`+ New buyer code(s) added to known list: ${[...newBuyersFound].join(', ')}`);
  }
  // Resolve collisions — most recent (largest) PO wins
  const resolved={};
  Object.keys(byKey).forEach(key=>{
    const group=byKey[key];
    const distinct=[...new Set(group.map(g=>g.buyer))];
    if(distinct.length===1){resolved[key]=distinct[0];}
    else{
      const winner=group.sort((a,b)=>b.fullDigits.localeCompare(a.fullDigits,undefined,{numeric:true}))[0];
      resolved[key]=winner.buyer;
    }
  });
  return resolved;
}

function runImport(){
  const logEl=$('importLog');
  logEl.textContent='';
  let added=0,updated=0,skippedPaid=0,skippedDupe=0,unmapped=[];

  // Build existing lookup across BOTH active and paid
  const existingMap={};
  PAID.forEach(r=>existingMap[r.id]={...r,inActive:false});
  ACTIVE.forEach(r=>existingMap[r.id]={...r,inActive:true});

  // Build buyer map if buyers loaded
  let buyerMap={};
  if(pendingBuyers){
    buyerMap=buildBuyerMap(pendingBuyers);
    log('importLog',`Built ${Object.keys(buyerMap).length} PO→buyer mappings`);
  }

  if(pendingExport){
    const seen=new Set();
    pendingExport.forEach(row=>{
      const inv=(row.InvoiceNumber||'').trim();
      if(!inv)return;
      if(seen.has(inv)){skippedDupe++;return;}
      seen.add(inv);

      const code=(row.Supplier||'').trim().toUpperCase();
      const supName=SUPPLIER_MAP[code]||code;
      if(!SUPPLIER_MAP[code]&&code)unmapped.push(code);

      const invDate=normalizeDate(row.InvoiceDate||'');
      const dueDate=normalizeDate(row.DueDate||'');
      const overdue=calcOverdue(dueDate);

      // Buyer from map
      const po=(row.PurchaseOrderNumber||'').trim();
      const digits=po.replace(/\D/g,'');
      const poKey=digits.slice(-7);
      const buyer=buyerMap[poKey]||'';

      const fields={
        vendorInvoice:(row.VendorInvoiceNumber||'').trim(),
        po:po,
        supplier:supName,
        amt:parseMoney(row['Invoice Amt']),
        balance:parseMoney(row.OpenBalance),
        discount:parseMoney(row.Discount),
        net:parseMoney(row.NetAmount),
        freight:parseMoney(row.FreightAmount),
        misc:parseMoney(row.MiscAmount),
        merch:parseMoney(row.MerchAmount),
        daysOverdue:overdue,
        invoiceDate:invDate,
        dueDate:dueDate,
      };

      if(existingMap[inv]){
        const ex=existingMap[inv];
        if(!ex.inActive||ex.status==='Paid'||ex.status==='Credited'){skippedPaid++;return;}
        // Update financials, preserve status/notes/buyer(if set)
        // Write back to ACTIVE — preserve buyer if already set
        const idx=ACTIVE.findIndex(r=>r.id===inv);
        if(idx!==-1){
          const existingBuyer=ACTIVE[idx].buyer;
          ACTIVE[idx]={...ACTIVE[idx],...fields,...(!existingBuyer&&buyer?{buyer}:{})};
        }
        updated++;
      } else {
        const newRow={id:inv,...fields,status:'Open',buyer:buyer,notes:''};
        ACTIVE.push(newRow);
        added++;
      }
    });
    log('importLog',`Import: ${added} added, ${updated} updated, ${skippedPaid} skipped (Paid/Credited), ${skippedDupe} CSV dupes`);
    if(unmapped.length>0)log('importLog',`Unknown supplier codes: ${[...new Set(unmapped)].join(', ')}`);
  }

  // Buyer CSV alone does nothing — buyers are matched only during Export_Statements import
  if(pendingBuyers&&!pendingExport){
    log('importLog','ℹ Buyers.csv loaded but no Export_Statements.csv provided.\nBuyer matching only runs when importing new invoices from Export_Statements.');
  }

  render();
  refreshFilterOptions();
  markDirty();
  showToast(`Import done — ${added} added, ${updated} updated`);
  log('importLog','✓ Complete. Click 💾 Save in the top bar to save to GitHub.');
}

}

function init(){refreshFilterOptions();render();}

// ── FILTERS ───────────────────────────────────────────────────────
function applyF(){
  fBuyer=$('fBuyer').value;fSupplier=$('fSupplier').value;
  fFrom=$('fFrom').value;fTo=$('fTo').value;
  $('fBuyer').classList.toggle('on',!!fBuyer);
  $('fSupplier').classList.toggle('on',!!fSupplier);
  render();
}
function clearF(){
  fBuyer=fSupplier=fFrom=fTo='';
  $('fBuyer').value='';$('fSupplier').value='';
  $('fFrom').value='';$('fTo').value='';
  $('fBuyer').classList.remove('on');$('fSupplier').classList.remove('on');
  activeChips.clear();sumSt=null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('on'));
  render();
}
function toggleChip(s,el){
  sumSt=null;
  if(activeChips.has(s)){activeChips.delete(s);el.classList.remove('on');}
  else{activeChips.add(s);el.classList.add('on');}
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('on'));
  render();
}
function sumClick(s){
  sumSt=sumSt===s?null:s;
  document.querySelectorAll('.sc').forEach(c=>c.classList.remove('on'));
  if(sumSt){const m={'Open':'sumO','Ready to Pay':'sumR','Credit Created':'sumC','overdue':'sumD'};$(m[s]).classList.add('on');}
  render();
}

function getFiltered(){
  let d=dataset();
  const q=$('srch').value.toLowerCase().trim();
  if(q)d=d.filter(r=>r.id.toLowerCase().includes(q)||r.supplier.toLowerCase().includes(q)||String(r.po).toLowerCase().includes(q)||String(r.vendorInvoice).toLowerCase().includes(q)||(r.buyer||'').toLowerCase().includes(q)||(r.tags||[]).some(function(t){return t.name.toLowerCase().includes(q);}));
  if(fBuyer==='__unassigned__')d=d.filter(r=>!r.buyer);
  else if(fBuyer)d=d.filter(r=>r.buyer===fBuyer);
  if(fSupplier)d=d.filter(r=>r.supplier.split(':')[0].trim()===fSupplier);
  if(fFrom)d=d.filter(r=>r.dueDate>=fFrom);
  if(fTo)d=d.filter(r=>r.dueDate<=fTo);
  // Summary bar filter
  if(sumSt){
    if(sumSt==='overdue')d=d.filter(r=>r.daysOverdue>0&&r.status!=='Paid');
    else d=d.filter(r=>r.status===sumSt);
  }
  // Multi-select chips
  if(activeChips.size>0){
    d=d.filter(r=>{
      if(activeChips.has('overdue')&&r.daysOverdue>0&&r.status!=='Paid')return true;
      if(activeChips.has('flagged')&&r.flagged)return true;
      if(activeChips.has('tagged')&&(r.tags||[]).length>0)return true;
      if(activeChips.has(r.status))return true;
      return false;
    });
  }
  const s=$('srt').value; d=[...d];
  if(s==='due')d.sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  if(s==='due-')d.sort((a,b)=>b.dueDate.localeCompare(a.dueDate));
  if(s==='inv')d.sort((a,b)=>a.invoiceDate.localeCompare(b.invoiceDate));
  if(s==='inv-')d.sort((a,b)=>b.invoiceDate.localeCompare(a.invoiceDate));
  if(s==='tag')d.sort((a,b)=>{var at=(a.tags||[]).map(function(t){return t.name;}).sort().join(',');var bt=(b.tags||[]).map(function(t){return t.name;}).sort().join(',');if(!at&&bt)return 1;if(at&&!bt)return -1;return at.localeCompare(bt);});
  return d;
}

// ── RENDER ────────────────────────────────────────────────────────
function updateCounts(){
  $('cntO').textContent=ACTIVE.filter(r=>r.status==='Open').length;
  $('cntR').textContent=ACTIVE.filter(r=>r.status==='Ready to Pay').length;
  $('cntC').textContent=ACTIVE.filter(r=>r.status==='Credit Created').length;
  $('cntD').textContent=ACTIVE.filter(r=>r.daysOverdue>0).length;
}
function updateTabs(){
  $('tabA').textContent=`Active (${ACTIVE.length})`;
  $('tabP').textContent=`Paid (${PAID.length})`;
}
function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(v=>v.classList.remove('on'));el.classList.add('on');render();}
function setView(v){
  view=v;
  $('listView').style.display=v==='list'?'':'none';
  $('calView').style.display=v==='cal'?'':'none';
  $('btnList').classList.toggle('on',v==='list');
  $('btnCal').classList.toggle('on',v==='cal');
  if(v==='cal')renderCal();
}
function render(){
  updateCounts();updateTabs();
  if(view==='cal'){renderCal();return;}
  const d=getFiltered();const el=$('ilist');
  if(!d.length){el.innerHTML='<div class="empty"><div class="ei">📭</div><h3>No invoices found</h3><p>Try adjusting your filters.</p></div>';return;}
  el.innerHTML=d.map(r=>{
    const ov=r.daysOverdue>0&&r.status!=='Paid';
    const sk=r.status==='Ready to Pay'?'R':r.status==='Credit Created'?'C':r.status==='Paid'?'P':'O';
    const bc=sk==='O'?'bO':sk==='R'?'bR':sk==='C'?'bC':'bP';
    const bl=sk==='R'?'Ready to Pay':r.status;
    return `<div class="card s${sk}" onclick="openM('${r.id}')">
      <div class="ctop"><div class="cid">${r.id}${verifyBadge(r)}</div><div class="amt-wrap">${renderTagBadges(r.tags)}${r.flagged?'<span class="flag-dot" title="Needs attention"></span>':''}<div class="camt${r.amt<0?' neg':''}">${fmtSigned(r.amt)}</div></div></div>
      <div class="csup">${r.supplier}</div>
      <div class="cmeta">
        <span class="badge ${bc}">${bl}</span>
        ${ov?`<span class="badge bD">⚠ ${r.daysOverdue}d overdue</span>`:r.daysOverdue===0?`<span class="badge bDue">Due ${fmtD(r.dueDate)}</span>`:''}
        <span class="cbuy">${r.buyer||'—'}</span>
      </div>
    </div>`;
  }).join('');
}

// ── CALENDAR ──────────────────────────────────────────────────────
function calNav(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}
function renderCal(){
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  $('calT').textContent=`${MN[calM]} ${calY}`;
  const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let h=DN.map(d=>`<div class="cdh">${d}</div>`).join('');
  const first=new Date(calY,calM,1).getDay(),total=new Date(calY,calM+1,0).getDate();
  const td=new Date();
  const byDay={};
  getFiltered().forEach(r=>{
    const d=new Date(r.dueDate+'T00:00:00');
    if(d.getFullYear()===calY&&d.getMonth()===calM){
      const day=d.getDate();if(!byDay[day])byDay[day]=[];byDay[day].push(r);
    }
  });
  for(let i=0;i<first;i++)h+='<div class="cd om"></div>';
  for(let day=1;day<=total;day++){
    const iT=td.getFullYear()===calY&&td.getMonth()===calM&&td.getDate()===day;
    const inv=byDay[day]||[];
    const net=inv.reduce((s,r)=>s+(r.net||0),0);
    const hasOv=inv.some(r=>r.daysOverdue>0&&r.status!=='Paid');
    const counts={};
    inv.forEach(r=>{
      const ov=r.daysOverdue>0&&r.status!=='Paid';
      const c=ov?'dD':r.status==='Ready to Pay'?'dR':r.status==='Credit Created'?'dC':r.status==='Paid'?'dP':'dO';
      counts[c]=(counts[c]||0)+1;
    });
    const dots=['dD','dO','dR','dC','dP'].filter(c=>counts[c]).map(c=>`<span class="dchip ${c}">${counts[c]}</span>`).join('');
    const netStr=inv.length?`<div class="cdnet${hasOv?' ov':''}${net<0?' negnet':''}">${fmtSigned(net)}${dayVerifyIcon(inv)}</div>`:'';
    const oc=inv.length?`onclick="dayClick(${day})"`:'';
    h+=`<div class="cd${iT?' today':''}" ${oc}><div class="cdn">${day}</div><div class="cddots">${dots}</div>${netStr}</div>`;
  }
  $('calG').innerHTML=h;
}
function dayClick(day){
  const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const inv=getFiltered().filter(r=>r.dueDate===ds);
  if(!inv.length)return;
  if(inv.length===1){openM(inv[0].id);return;}
  const totalAmt=inv.reduce((s,r)=>s+(r.amt||0),0);
  const totalDisc=inv.reduce((s,r)=>s+(r.discount||0),0);
  const totalNet=inv.reduce((s,r)=>s+(r.net||0),0);
  const d=new Date(ds+'T00:00:00');
  $('dpopT').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  $('dpopS').textContent=`${inv.length} invoices`;
  $('dpopN').innerHTML='<span style="font-size:11px;color:var(--ink3);font-weight:600">Amt</span> '+fmtSigned(totalAmt)+' &nbsp;<span style="font-size:11px;color:var(--ink3);font-weight:600">Disc</span> '+fmtSigned(totalDisc)+' &nbsp;<span style="font-size:11px;color:var(--ink3);font-weight:600">Net</span> '+fmtSigned(totalNet);
  $('dpopN').className='dpop-tot'+(totalNet<0?' negnet':'');
  const sk=r=>r.status==='Ready to Pay'?'R':r.status==='Credit Created'?'C':r.status==='Paid'?'P':'O';
  const bc=k=>k==='O'?'bO':k==='R'?'bR':k==='C'?'bC':'bP';
  inv.sort(function(a,b){return (a.supplier||'').localeCompare(b.supplier||'');});
  var dpH='',lastSup='',gA=0,gD=0,gN=0;
  inv.forEach(function(r){
    var sup=r.supplier||'\u2014';
    if(sup!==lastSup){
      if(lastSup)dpH+='<div class="dpop-subtotal"><span class="sub-label">Subtotal</span><span>'+fmtSigned(gA)+'</span><span>'+fmtSigned(gD)+'</span><span>'+fmtSigned(gN)+'</span></div>';
      dpH+='<div class="dpop-group-hdr">'+sup+'</div>';
      lastSup=sup;gA=0;gD=0;gN=0;
    }
    gA+=(r.amt||0);gD+=(r.discount||0);gN+=(r.net||0);
    dpH+='<div class="dpop-item" onclick="openedFromDpop=true;$(\'dpopOv\').classList.remove(\'on\');openM(\''+r.id+'\')"><div><div class="dpi-id">'+r.id+verifyBadge(r)+'</div><div class="dpi-sup">PO '+(r.po||'\u2014')+' \u00b7 VI '+(r.vendorInvoice||'\u2014')+'</div><span class="badge '+bc(sk(r))+'" style="margin-top:4px">'+r.status+'</span></div><div><div class="dpi-amt'+(r.amt<0?' neg':'')+'">'+renderTagBadges(r.tags)+(r.flagged?'<span class="flag-dot" title="Needs attention"></span>':'')+fmtSigned(r.amt)+'</div><div class="dpi-buy" style="font-size:10px">Disc '+fmtSigned(r.discount)+' \u00b7 Net '+fmtSigned(r.net)+'</div></div></div>';
  });
  if(lastSup)dpH+='<div class="dpop-subtotal"><span class="sub-label">Subtotal</span><span>'+fmtSigned(gA)+'</span><span>'+fmtSigned(gD)+'</span><span>'+fmtSigned(gN)+'</span></div>';
  $('dpopL').innerHTML=dpH;
  $('dpopOv').classList.add('on');
}
function closeDpop(e){if(e.target===$('dpopOv'))closeDpopNow();}
function closeDpopNow(){$('dpopOv').classList.remove('on');}
let openedFromDpop=false;

// ── MODAL ─────────────────────────────────────────────────────────
function openM(id){
  const r=[...ACTIVE,...PAID].find(x=>x.id===id);if(!r)return;
  editId=id;editSt=r.status;editFlag=!!r.flagged;
  originalFlag=!!r.flagged;
  editTags=(r.tags||[]).map(function(t){return {name:t.name,color:t.color};});
  $('mId').innerHTML=r.id+verifyBadge(r);$('mSup').textContent=r.supplier;
  $('mAmt').textContent=fmtSigned(r.amt);$('mAmt').className='mamt'+(r.amt<0?' neg':'');
  currentPdfPath=pdfWindowsPath(r.id);
  $('mIDate').textContent=fmtD(r.invoiceDate);$('mDDate').textContent=fmtD(r.dueDate);
  const ov=$('mOv');ov.textContent=r.daysOverdue>0?`${r.daysOverdue} days`:'On time';
  ov.className='icv'+(r.daysOverdue>0?' ov':' ok');
  $('mPO').textContent=r.po||'—';$('mVI').textContent=r.vendorInvoice||'—';
  // Populate buyer text input + autocomplete list
  $('mBuy').value=r.buyer||'';
  $('mBuy').classList.remove('invalid');
  const allBuyers=[...new Set([...KNOWN_BUYERS,...ACTIVE,...PAID].map(x=>typeof x==='string'?x:x.buyer).filter(Boolean))].sort();
  $('buyerList').innerHTML=allBuyers.map(b=>`<option value="${b}">`).join('');
  $('mA').textContent=fmtSigned(r.amt);$('mA').className='icv'+(r.amt<0?' ov':'');
  $('mDi').textContent=fmtSigned(r.discount);$('mDi').className='icv'+(r.discount<0?' ov':'');
  $('mN').textContent=fmtSigned(r.net);$('mN').className='icv'+(r.net<0?' ov':'');
  $('mFr').textContent=fmtSigned(r.freight);$('mFr').className='icv'+(r.freight<0?' ov':'');
  $('mMi').textContent=fmtSigned(r.misc);$('mMi').className='icv'+(r.misc<0?' ov':'');
  $('mMe').textContent=fmtSigned(r.merch);$('mMe').className='icv'+(r.merch<0?' ov':'');
  ensureNoteArray(r);
  renderNoteLog(r.notes);
  $('mNotes').value='';
  document.querySelectorAll('.stopt').forEach(el=>{
    el.className='stopt';
    if(el.dataset.v===r.status){const k=r.status==='Ready to Pay'?'R':r.status==='Credit Created'?'C':r.status==='Paid'?'P':'O';el.classList.add('s'+k);}
  });
  $('flagBtn').classList.toggle('flag-btn-on',editFlag);
  $('flagBtn').textContent=editFlag?'🔴 Needs Attention':'Needs Attention';
  populateNotifyDropdowns();
  var _nr=[...ACTIVE,...PAID].find(function(x){return x.id===editId;});
  if(_nr){var _emails=[_nr.notifyEmail1,_nr.notifyEmail2].concat(_nr.notifyEmails||[]).filter(Boolean);Array.from($('notifyUsers').querySelectorAll('input')).forEach(function(o){o.checked=_emails.indexOf(o.value)!==-1;});}
  renderTagPills();
  $('mov').classList.add('on');document.body.style.overflow='hidden';
}
function closeMov(e){if(e.target===$('mov'))closeMov2();}
function closeMov2(){$('mov').classList.remove('on');document.body.style.overflow='';editId=null;if(openedFromDpop){openedFromDpop=false;$('dpopOv').classList.add('on');}}
function pickSt(v,el){
  editSt=v;
  document.querySelectorAll('.stopt').forEach(e=>e.className='stopt');
  const k=v==='Ready to Pay'?'R':v==='Credit Created'?'C':v==='Paid'?'P':'O';
  el.classList.add('s'+k);
}
function toggleFlag(){
  editFlag=!editFlag;
  $('flagBtn').classList.toggle('flag-btn-on',editFlag);
  $('flagBtn').textContent=editFlag?'🔴 Needs Attention':'Needs Attention';
}
function populateNotifyDropdowns(){
  var opts=APP_PROFILES.map(function(p){return '<label class="notify-opt"><input type="checkbox" value="'+p.email+'">'+p.name+'</label>';}).join('');
  $('notifyUsers').innerHTML=opts;
}
function saveInv(){
  if(!editId)return;
  const buyerInput=$('mBuy').value.trim().toUpperCase();
  const allKnown=[...new Set([...KNOWN_BUYERS,...ACTIVE,...PAID].map(x=>typeof x==='string'?x:x.buyer).filter(Boolean))];
  if(buyerInput && !allKnown.includes(buyerInput)){
    $('mBuy').classList.add('invalid');
    showToast('Unknown buyer code — check spelling or leave blank');
    return;
  }
  const buyer=buyerInput;
  let savedRow=null;
  let idx=ACTIVE.findIndex(r=>r.id===editId);
  if(idx!==-1){
    ACTIVE[idx].status=editSt;ACTIVE[idx].buyer=buyer;ACTIVE[idx].flagged=editFlag;
    ACTIVE[idx].notifyEmails=Array.from($('notifyUsers').querySelectorAll('input:checked')).map(function(o){return o.value;});ACTIVE[idx].tags=editTags;
    if(editSt==='Paid'||editSt==='Credited'){PAID.unshift({...ACTIVE[idx]});savedRow={...ACTIVE[idx]};ACTIVE.splice(idx,1);}
    else{savedRow=ACTIVE[idx];}
  } else {
    idx=PAID.findIndex(r=>r.id===editId);
    if(idx!==-1){PAID[idx].status=editSt;PAID[idx].buyer=buyer;PAID[idx].flagged=editFlag;PAID[idx].notifyEmails=Array.from($('notifyUsers').querySelectorAll('input:checked')).map(function(o){return o.value;});PAID[idx].tags=editTags;savedRow=PAID[idx];}
  }
  if(savedRow){
    const flagJustTurnedOn = editFlag && !originalFlag;
    if(flagJustTurnedOn) sendNotifyEmail(savedRow, 'flagged');
  }
  closeMov2();render();markDirty();
  showToast(editSt==='Paid'?'✓ Moved to Paid':'✓ Saved');
}
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2400);
}

init();

window.addEventListener('message', function(e){
  if(e.data && e.data.type==='credentials'){
    GH_TOKEN = e.data.token || '';
    APP_USER = e.data.user || '';
    APP_NAME = e.data.name || APP_USER;
    APP_EMAIL = e.data.email || '';
    APP_PROFILES = e.data.profiles || [];
    if(e.data.deepLinkId) pendingDeepLink=e.data.deepLinkId;
    if(GH_TOKEN) loadFromGitHub();
  }
});
// If opened standalone (no parent shell), loadFromGitHub will fail gracefully (empty token)
if(GH_TOKEN) loadFromGitHub();

<script type="text/html" id="tpl-hon"><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HON Invoice Tracker</title>
<style>
:root{
  --ink:#152535;--ink2:#3a5070;--ink3:#7090a8;

}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--surface);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

.mgmt-btn:hover{background:rgba(255,255,255,.25)}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.sc{background:var(--card);padding:10px 8px;text-align:center;cursor:pointer;transition:background .15s}

.filters{background:var(--card);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}

.fsel:focus,.fsel.on{border-color:var(--accent);background:var(--adim);color:var(--accent)}
.drange{display:flex;gap:4px;align-items:center;flex:2;min-width:180px}
.drange input{flex:1;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:11px;background:var(--card);color:var(--ink);outline:none;font-family:var(--font);height:30px}
.drange input:focus{border-color:var(--accent)}
.drange span{font-size:11px;color:var(--ink3);white-space:nowrap}
.clrbtn{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:11px;font-weight:700;background:var(--card);color:var(--ink2);cursor:pointer;font-family:var(--font);white-space:nowrap;height:30px}
.clrbtn:hover{background:var(--ddim);border-color:var(--danger);color:var(--danger)}

.chips{background:var(--card);border-bottom:1px solid var(--border);padding:5px 14px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center}
.chips::-webkit-scrollbar{display:none}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(26,31,46,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}

.icv{font-size:13px;font-weight:600;color:var(--ink)}.icv.mono{font-family:var(--mono);font-size:11px}
.icv.ov{color:var(--danger)}.icv.ok{color:var(--ready)}
.stctl{margin-bottom:14px}

.stopt.sR{border-color:var(--ready);background:var(--rdim);color:#065f46}
.stopt.sC{border-color:var(--credit);background:var(--cdim);color:#5b21b6}
.stopt.sP{border-color:var(--paid);background:var(--pdim);color:var(--paid)}
.stopt.flag-active{border-color:var(--danger);background:var(--ddim);color:#991b1b}
.program-sel{width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:12px;font-weight:600;background:var(--card);color:var(--ink);outline:none;font-family:var(--mono);transition:border-color .15s}

.program-sel.invalid{border-color:var(--danger);background:var(--ddim)}

.note-add .ntxt{flex:1;min-height:44px}

.savebtn:hover{background:var(--accent)}
.flag-btn-on{background:var(--danger)!important;color:#fff!important}
.notify-row{display:flex;flex-direction:column;gap:6px}
.notify-multi{width:100%;padding:4px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:var(--font);color:var(--ink);background:var(--card);max-height:160px;overflow-y:auto}
.notify-opt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:13px;cursor:pointer}
.notify-opt:hover{background:var(--adim)}
.notify-opt input{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
.tag-sec{margin:10px 0}
.tag-sec .stlbl{margin-bottom:6px}
.tag-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;min-height:24px}

.tag-add-btn{padding:3px 10px;border:1.5px dashed var(--border);border-radius:var(--rs);font-size:11px;color:var(--ink3);cursor:pointer;background:none;font-family:var(--font)}

.tag-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.25);width:280px;z-index:1200;padding:16px;display:none}
.tag-pop.on{display:block}

.tag-select-item:hover{opacity:1}
.tag-create-form{display:flex;flex-direction:column;gap:10px}
.tag-create-form input[type=text]{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:var(--font);outline:none;color:var(--ink);background:var(--card)}
.tag-create-form input[type=text]:focus{border-color:var(--accent)}
.tag-create-form input[type=color]{width:100%;height:36px;border:none;cursor:pointer;border-radius:var(--rs)}
.tag-create-form button{padding:8px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.tag-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;color:#fff;clip-path:polygon(0 0,calc(100% - 4px) 0,100% 50%,calc(100% - 4px) 100%,0 100%,4px 50%);padding:1px 9px 1px 7px;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;margin-right:2px}

/* MANAGEMENT PANEL */
.mgmt-ov{position:fixed;inset:0;background:rgba(26,31,46,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}

.mgmt-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 8px}
.mgmt-head{padding:4px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mgmt-title{font-size:16px;font-weight:800;color:var(--ink)}
.mgmt-x{background:var(--surface);border:none;border-radius:50%;width:30px;height:30px;font-size:17px;cursor:pointer;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.mgmt-body{padding:16px 18px;display:flex;flex-direction:column;gap:16px}
.mgmt-section{background:var(--surface);border-radius:var(--r);padding:14px 16px}

.mgmt-section p{font-size:12px;color:var(--ink2);line-height:1.5;margin-bottom:10px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--adim)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:24px;margin-bottom:6px}
.drop-label{font-size:13px;font-weight:600;color:var(--ink2)}
.drop-sub{font-size:11px;color:var(--ink3);margin-top:3px}
.drop-zone.loaded{border-color:var(--ready);background:var(--rdim)}
.drop-zone.loaded .drop-label{color:#065f46}
.file-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.run-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s}
.run-btn:hover{background:#1d4ed8}
.run-btn:disabled{background:var(--ink3);cursor:not-allowed}
.run-btn.danger{background:var(--danger)}.run-btn.danger:hover{background:#dc2626}
.run-btn.success{background:var(--ready)}.run-btn.success:hover{background:#059669}
.log-box{background:var(--ink);color:#a3e635;font-family:var(--mono);font-size:11px;border-radius:var(--rs);padding:10px 12px;min-height:60px;max-height:160px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;margin-top:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}

@media(min-width:600px){
  .modal{border-radius:20px;margin:20px;max-height:85vh}.mov{align-items:center}.mhandle{display:none}
  .mgmt-panel{border-radius:20px;margin:20px;max-height:80vh}.mgmt-ov{align-items:center}.mgmt-handle{display:none}
  .igrid{grid-template-columns:repeat(3,1fr)}.frow{flex-wrap:nowrap}
}
.modal,.mgmt-panel{background:#fff!important}
</style>
</head>

const GH_API   = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

let ghSha = null; // current file SHA — required for updates
let baseSnap = {}; // id -> canonical JSON of each record as last loaded/saved (merge baseline)

function canon(o){
  if(o===null||typeof o!=='object') return JSON.stringify(o);
  if(Array.isArray(o)) return '['+o.map(canon).join(',')+']';
  return '{'+Object.keys(o).sort().map(k=>JSON.stringify(k)+':'+canon(o[k])).join(',')+'}';
}
function snapshot(records){ const m={}; records.forEach(r=>{ if(r && r.id!=null) m[String(r.id)]=canon(r); }); return m; }
// HON: a record lives in PAID when its status is Paid
function isPaidStatus(s){ return s==='Paid'; }

async function ghFetch(){
  const metaResp = await fetch(GH_API, { cache:'no-store', headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3+json' } });
  if(!metaResp.ok) throw new Error(`GitHub ${metaResp.status}: ${await metaResp.text()}`);
  const meta = await metaResp.json();
  let content;
  if(meta.content && meta.encoding==='base64'){
    content = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g,'')))));
  } else {
    const raw = await fetch(GH_API, { cache:'no-store', headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3.raw' } });
    if(!raw.ok) throw new Error(`GitHub raw ${raw.status}: ${await raw.text()}`);
    content = JSON.parse(await raw.text());
  }
  return { sha: meta.sha, content };
}
async function ghPut(jsonStr, sha){
  const content = btoa(unescape(encodeURIComponent(jsonStr)));
  return fetch(GH_API, {
    method:'PUT',
    headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' },
    body: JSON.stringify({ message:`Update invoices ${new Date().toISOString().split('T')[0]}`, content, sha })
  });
}

async function loadFromGitHub() {
  showBanner('Loading invoices…', 'info');
  try {
    const metaResp = await fetch(GH_API, {
      headers: {
        'Authorization': `token ${GH_TOKEN}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    if (!metaResp.ok) throw new Error(`GitHub ${metaResp.status}: ${await metaResp.text()}`);
    const meta = await metaResp.json();
    ghSha = meta.sha;

    let content;
    if (meta.content && meta.encoding === 'base64') {
      // File is under 1MB — standard base64 content is usable directly
      content = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, '')))));
    } else {
      // File is over 1MB — GitHub omits content here, fetch raw instead
      const rawResp = await fetch(GH_API, {
        cache: 'no-store',
        headers: {
          'Authorization': `token ${GH_TOKEN}`,
          'Accept': 'application/vnd.github.v3.raw'
        }
      });
      if (!rawResp.ok) throw new Error(`GitHub raw ${rawResp.status}: ${await rawResp.text()}`);
      const rawText = await rawResp.text();
      content = JSON.parse(rawText);
    }
    ACTIVE = content.active || [];
    PAID   = content.paid   || [];
    if (ACTIVE.length === 0 && PAID.length === 0 && content.active === undefined) {
      console.error('GitHub response had no "active"/"paid" fields. Keys found:', Object.keys(content || {}));
      throw new Error('Fetched data missing expected fields — open browser console (F12) for details');
    }
    if(content.knownPrograms && content.knownPrograms.length) KNOWN_PROGRAMS = content.knownPrograms;
    baseSnap = snapshot([...ACTIVE, ...PAID]);
    refreshFilterOptions();
    render();
    showBanner(`Loaded ${ACTIVE.length} active, ${PAID.length} paid`, 'ok');
    if(pendingDeepLink){var _dl=pendingDeepLink;pendingDeepLink=null;setTimeout(function(){openM(_dl);},150);}
  } catch(e) {
    showBanner('Load failed: ' + e.message, 'err');
  }
}

async function saveToGitHub() {
  showBanner('Saving…', 'info');
  const btn = $('ghSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  try {
    const ours = {};
    [...ACTIVE, ...PAID].forEach(r => { if (r && r.id != null) ours[String(r.id)] = r; });

    for (let attempt = 0; attempt < 3; attempt++) {
      const { sha, content } = await ghFetch();
      const theirs = {};
      [...(content.active || []), ...(content.paid || [])].forEach(r => { if (r && r.id != null) theirs[String(r.id)] = r; });

      const ids = new Set([...Object.keys(baseSnap), ...Object.keys(ours), ...Object.keys(theirs)]);
      const merged = [];
      const conflicts = [];
      ids.forEach(id => {
        const b = baseSnap[id];
        const o = ours[id], t = theirs[id];
        const oc = o ? canon(o) : undefined;
        const tc = t ? canon(t) : undefined;
        const ourChanged   = oc !== b;
        const theirChanged = tc !== b;
        if (!ourChanged)   { if (t) merged.push(t); return; }
        if (!theirChanged) { if (o) merged.push(o); return; }
        if (oc === tc)     { if (o) merged.push(o); return; }
        if (o && t) {
          const oRest = {...o, notes: []}; const tRest = {...t, notes: []};
          if (canon(oRest) === canon(tRest)) {
            const bNotes = b ? (JSON.parse(b).notes || []) : [];
            const result = {...o, notes: mergeNotes(bNotes, o.notes||[], t.notes||[])};
            merged.push(result); return;
          }
        }
        conflicts.push(id);
      });

      if (conflicts.length) {
        const list = conflicts.slice(0, 8).join(', ') + (conflicts.length > 8 ? '…' : '');
        showBanner(`Save blocked — ${conflicts.length} invoice(s) were changed by someone else since you loaded: ${list}. Reload to pull the latest, then re-apply your edits.`, 'err');
        if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
        return;
      }

      const newActive = [], newPaid = [];
      merged.forEach(r => { (isPaidStatus(r.status) ? newPaid : newActive).push(r); });
      const mergedPrograms = [...new Set([...(content.knownPrograms || []), ...(KNOWN_PROGRAMS || [])])].sort();

      const payload = JSON.stringify({ active: newActive, paid: newPaid, knownPrograms: mergedPrograms });
      const put = await ghPut(payload, sha);
      if (put.status === 409) continue;
      if (!put.ok) throw new Error(`GitHub ${put.status}: ${await put.text()}`);

      const result = await put.json();
      ghSha = result.content.sha;
      ACTIVE = newActive; PAID = newPaid; KNOWN_PROGRAMS = mergedPrograms;
      baseSnap = snapshot([...ACTIVE, ...PAID]);
      hasUnsavedChanges = false; updateSaveBtn();
      refreshFilterOptions(); render();
      showBanner('Saved ✓', 'ok');
      if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
      return;
    }
    showBanner('Save failed: too many concurrent edits in a row — please try again.', 'err');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
  } catch(e) {
    showBanner('Save failed: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = '💾 Save'; }
  }
}

function ensureNoteArray(record){

function renderNoteLog(notes){
  const el=$('noteLog'); if(!el)return;
  const arr=Array.isArray(notes)?notes:[];
  if(!arr.length){ el.innerHTML='<div class="note-empty">No notes yet</div>'; return; }
  const sorted=[...arr].sort((a,b)=>new Date(b.at)-new Date(a.at));
  el.innerHTML=sorted.map(n=>{
    const d=new Date(n.at);
    const ds=isNaN(d)?n.at:d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

    return `<div class="note-entry"><div class="note-meta"><span>${who}</span><span>${ds}</span></div><div class="note-text">${txt}</div></div>`;
  }).join('');
}

  if(!txt||!editId)return;
  const r=[...ACTIVE,...PAID].find(x=>x.id===editId);if(!r)return;
  ensureNoteArray(r);
  const entry={text:txt, by:APP_NAME||APP_USER||'Unknown', at:new Date().toISOString()};
  r.notes.push(entry);
  r.notifyEmails=Array.from($('notifyUsers').querySelectorAll('input:checked')).map(function(o){return o.value;});
  renderNoteLog(r.notes);
  $('mNotes').value='';
  markDirty();
  sendNotifyEmail(r, 'note');
}
function mergeNotes(base, ours, theirs){
  const key=e=>`${e.by}|${e.at}|${e.text}`;
  const seen=new Set();
  const all=[...(base||[]),...(ours||[]),...(theirs||[])];
  const merged=[];
  all.forEach(e=>{ const k=key(e); if(!seen.has(k)){seen.add(k);merged.push(e);} });
  return merged.sort((a,b)=>new Date(a.at)-new Date(b.at));
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=c;
    }
    vals.push(cur.trim());
    const row={};
    headers.forEach((h,i)=>row[h]=vals[i]||'');
    return row;
  });
}

function parseMoney(v){
  if(v===null||v===undefined||v==='')return 0;
  const s=String(v).replace(/[$,\s()]/g,'');
  const neg=String(v).trim().startsWith('(')||String(v).trim().startsWith('-');
  const n=parseFloat(s.replace(/^-/,''))||0;
  return neg?-n:n;
}

function calcOverdue(dueDateStr){
  if(!dueDateStr)return 0;
  const due=new Date(dueDateStr+'T00:00:00');
  const t=new Date(); t.setHours(0,0,0,0);
  return due<t?Math.floor((t-due)/86400000):0;
}

function normalizeDate(s){
  if(!s)return'';
  s=String(s).trim();
  // Handle M/D/YYYY -> YYYY-MM-DD
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  if(s.match(/^\d{4}-\d{2}-\d{2}$/))return s;
  // Handle DD-Mon-YYYY (e.g. 16-Jun-2026) from the Oracle BI report
  const monMap={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const m2=s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/);
  if(m2&&monMap[m2[2]])return`${m2[3]}-${monMap[m2[2]]}-${m2[1].padStart(2,'0')}`;
  return s;
}

function addDays(dateStr,days){
  if(!dateStr)return'';
  const d=new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}

function parseHonReportHtml(htmlText){
  // Parse the Oracle BI Publisher export — find the real data table
  // (the one with a "Transaction" header), skip metadata tables above it.
  const parser=new DOMParser();
  const doc=parser.parseFromString(htmlText,'text/html');
  const tables=[...doc.querySelectorAll('table')];
  let dataTable=null,headerRow=null;
  for(const t of tables){
    const rows=[...t.querySelectorAll('tr')];
    if(!rows.length)continue;
    const headerCells=[...rows[0].querySelectorAll('td,th')].map(c=>c.textContent.trim());
    if(headerCells.includes('Transaction')&&headerCells.includes('Purchase Order')){
      dataTable=t; headerRow=headerCells; break;
    }
  }
  if(!dataTable)throw new Error('Could not find the transaction table in this file — check it is the right report export.');

  const rows=[...dataTable.querySelectorAll('tr')].slice(1); // skip header row
  return rows.map(tr=>{
    const cells=[...tr.querySelectorAll('td,th')].map(c=>c.textContent.trim());
    const row={};
    headerRow.forEach((h,i)=>row[h]=cells[i]||'');
    return row;
  }).filter(r=>r['Transaction']); // drop any stray blank rows
}
