function buildProgramMap(programRows){
  // Program.csv has PAPO, PAVEND columns (or unnamed 0,1)
  const byKey={};
  const newProgramsFound=new Set();
  programRows.forEach(row=>{
    const po=row.PAPO||row['0']||Object.values(row)[0]||'';
    const prog=(row.PAVEND||row['1']||Object.values(row)[1]||'').trim().toUpperCase();
    if(!po||!prog||po==='PAPO')return;
    const digits=po.replace(/\D/g,'');
    if(digits.length<1)return;
    const key=digits.slice(-7);
    if(!byKey[key])byKey[key]=[];
    byKey[key].push({fullDigits:digits,program:prog});
    if(!KNOWN_PROGRAMS.includes(prog)) newProgramsFound.add(prog);
  });
  if(newProgramsFound.size>0){
    KNOWN_PROGRAMS=[...new Set([...KNOWN_PROGRAMS,...newProgramsFound])].sort();
    log('importLog',`+ New program code(s) added to known list: ${[...newProgramsFound].join(', ')}`);
  }
  // Resolve collisions — most recent (largest) PO wins
  const resolved={};
  Object.keys(byKey).forEach(key=>{
    const group=byKey[key];
    const distinct=[...new Set(group.map(g=>g.program))];
    if(distinct.length===1){resolved[key]=distinct[0];}
    else{
      const winner=group.sort((a,b)=>b.fullDigits.localeCompare(a.fullDigits,undefined,{numeric:true}))[0];
      resolved[key]=winner.program;
    }
  });
  return resolved;
}

function runImport(){
  const logEl=$('importLog');
  logEl.textContent='';
  let added=0,updated=0,skippedPaid=0,skippedDupe=0;

  // Build existing lookup across BOTH active and paid
  const existingMap={};
  PAID.forEach(r=>existingMap[r.id]={...r,inActive:false});
  ACTIVE.forEach(r=>existingMap[r.id]={...r,inActive:true});

  // Build program map if Program.csv loaded
  let programMap={};
  if(pendingPrograms){
    programMap=buildProgramMap(pendingPrograms);
    log('importLog',`Built ${Object.keys(programMap).length} PO→program mappings`);
  }

  if(pendingExport){
    const seen=new Set();
    pendingExport.forEach(row=>{
      const txn=(row.Transaction||'').trim();
      if(!txn)return;
      if(seen.has(txn)){skippedDupe++;return;}
      seen.add(txn);

      const type=(row.Type||'Invoice').trim();
      const invDate=normalizeDate(row.Date||'');
      const shipDate=normalizeDate(row['Shipment Date']||'');
      const dueDate=normalizeDate(row['Due Date']||'');

      const po=(row['Purchase Order']||'').trim();
      const digits=po.replace(/\D/g,'');
      const poKey=digits.slice(-7);
      // Credit memos often carry free-text PO (e.g. "2026 HON Showroom Claim 168420")
      // with no clean digits — program simply stays blank in that case, by design.
      const program=programMap[poKey]||'';

      let amt=parseMoney(row['Original Amount']);
      let balance=parseMoney(row['Remaining Amount']);
      if(type==='Credit Memo'){
        if(amt>0)amt=-amt;
        if(balance>0)balance=-balance;
      }

      const baseFields={
        type:type,
        po:po,
        salesOrder:(row['Sales Order']||'').trim(),
        freight:parseMoney(row['Freight Amount']),
        tax:parseMoney(row['Tax Amount']),
        amt:amt,
        balance:balance,
        invoiceDate:invDate,
        shipDate:shipDate,
        dueDate:dueDate,
      };

      if(existingMap[txn]){
        const ex=existingMap[txn];
        if(!ex.inActive||ex.status==='Paid'){skippedPaid++;return;}
        const idx=ACTIVE.findIndex(r=>r.id===txn);
        if(idx!==-1){
          const existingProgram=ACTIVE[idx].program;
          // Preserve the existing Discount Yes/No flag — the source report
          // doesn't carry it, so re-importing must never reset a manual toggle.
          const discountFlag=ACTIVE[idx].discount==='No'?'No':'Yes';
          const discountDate=discountFlag==='No'?dueDate:addDays(dueDate,-10);
          const effDue=discountFlag==='Yes'?discountDate:dueDate;
          ACTIVE[idx]={...ACTIVE[idx],...baseFields,
            discount:discountFlag,discountDate:discountDate,effectiveDueDate:effDue,
            daysOverdue:calcOverdue(effDue),
            ...(!existingProgram&&program?{program}:{})};
        }
        updated++;
      } else {
        // New row — Discount defaults to Yes, Discount Date = Due Date − 10
        const discountDate=addDays(dueDate,-10);
        const effDue=discountDate||dueDate;
        const newRow={id:txn,...baseFields,
          discount:'Yes',discountDate:discountDate,effectiveDueDate:effDue,
          daysOverdue:calcOverdue(effDue),
          status:'Open',program:program,notes:''};
        ACTIVE.push(newRow);
        added++;
      }
    });
    log('importLog',`Import: ${added} added, ${updated} updated, ${skippedPaid} skipped (Paid), ${skippedDupe} dupes`);
  }

  // Program.csv alone does nothing — programs are matched only during Export_Statements import
  if(pendingPrograms&&!pendingExport){
    log('importLog','ℹ Program.csv loaded but no Export_Statements.csv provided.\nProgram matching only runs when importing new transactions from Export_Statements.');
  }

  render();
  refreshFilterOptions();
  markDirty();
  showToast(`Import done — ${added} added, ${updated} updated`);
  log('importLog','✓ Complete. Click 💾 Save in the top bar to save to GitHub.');
}

function runPurge(){
  const cutoff=new Date();
  cutoff.setFullYear(cutoff.getFullYear()-3);
  const cutoffStr=cutoff.toISOString().split('T')[0];
  const before=PAID.length;
  PAID=PAID.filter(r=>{
    if(!r.effectiveDueDate)return true;
    return r.effectiveDueDate>cutoffStr;
  });
  const removed=before-PAID.length;
  log('purgeLog',`Purged ${removed} paid invoices with due date before ${cutoffStr}.\n${PAID.length} paid invoices remain.`);
  updateCounts();
  updateTabs();
  markDirty();
  showToast(`Purged ${removed} old invoices`);
}

function log(elId,msg){
  const el=$(elId);
  el.textContent+=(el.textContent?'\n':'')+msg;
  el.scrollTop=el.scrollHeight;
}

function exportApp(){
  const activeJson=JSON.stringify(ACTIVE);
  const paidJson=JSON.stringify(PAID);

  // Read the current page source and replace data placeholders
  const src=document.documentElement.outerHTML;
  // Replace the data arrays between the markers
  const updated=src
    .replace(/let ACTIVE = \[[\s\S]*?\];(\s*\/\/ DATA)?\s*let PAID/,
      `let ACTIVE = ${activeJson};\nlet PAID`)
    .replace(/let PAID   = \[[\s\S]*?\];/,
      `let PAID   = ${paidJson};`);

  const blob=new Blob([updated],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`HON_InvoiceApp_${today()}.html`;
  a.click();
  showToast('App downloaded ✓');
}

function getFiltered(){
  let d=dataset();
  const q=$('srch').value.toLowerCase().trim();
  if(q)d=d.filter(r=>r.id.toLowerCase().includes(q)||String(r.po).toLowerCase().includes(q)||String(r.salesOrder).toLowerCase().includes(q)||(r.program||'').toLowerCase().includes(q)||(r.tags||[]).some(function(t){return t.name.toLowerCase().includes(q);}));
  if(fProgram==='__unassigned__')d=d.filter(r=>!r.program);
  else if(fProgram)d=d.filter(r=>r.program===fProgram);
  if(fFrom)d=d.filter(r=>r.effectiveDueDate>=fFrom);
  if(fTo)d=d.filter(r=>r.effectiveDueDate<=fTo);
  // Summary bar filter
  if(sumSt){
    if(sumSt==='overdue')d=d.filter(r=>r.daysOverdue>0&&r.status!=='Paid');
    else if(sumSt==='CreditMemo')d=d.filter(r=>r.type==='Credit Memo');
    else d=d.filter(r=>r.status===sumSt);
  }
  // Multi-select chips
  if(activeChips.size>0){
    d=d.filter(r=>{
      if(activeChips.has('overdue')&&r.daysOverdue>0&&r.status!=='Paid')return true;
      if(activeChips.has('CreditMemo')&&r.type==='Credit Memo')return true;
      if(activeChips.has('flagged')&&r.flagged)return true;
      if(activeChips.has('tagged')&&(r.tags||[]).length>0)return true;
      if(activeChips.has(r.status))return true;
      return false;
    });
  }
  const s=$('srt').value; d=[...d];
  if(s==='due')d.sort((a,b)=>a.effectiveDueDate.localeCompare(b.effectiveDueDate));
  if(s==='due-')d.sort((a,b)=>b.effectiveDueDate.localeCompare(a.effectiveDueDate));
  if(s==='inv')d.sort((a,b)=>a.invoiceDate.localeCompare(b.invoiceDate));
  if(s==='inv-')d.sort((a,b)=>b.invoiceDate.localeCompare(a.invoiceDate));
  if(s==='tag')d.sort((a,b)=>{var at=(a.tags||[]).map(function(t){return t.name;}).sort().join(',');var bt=(b.tags||[]).map(function(t){return t.name;}).sort().join(',');if(!at&&bt)return 1;if(at&&!bt)return -1;return at.localeCompare(bt);});
  return d;
}

function calNav(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}
function renderCal(){
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  $('calT').textContent=`${MN[calM]} ${calY}`;
  const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let h=DN.map(d=>`<div class="cdh">${d}</div>`).join('');
  const first=new Date(calY,calM,1).getDay(),total=new Date(calY,calM+1,0).getDate();
  const td=new Date();
  const byDay={};
  getFiltered().forEach(r=>{
    const d=new Date(r.effectiveDueDate+'T00:00:00');
    if(d.getFullYear()===calY&&d.getMonth()===calM){
      const day=d.getDate();if(!byDay[day])byDay[day]=[];byDay[day].push(r);
    }
  });
  for(let i=0;i<first;i++)h+='<div class="cd om"></div>';
  for(let day=1;day<=total;day++){
    const iT=td.getFullYear()===calY&&td.getMonth()===calM&&td.getDate()===day;
    const inv=byDay[day]||[];
    const net=inv.reduce((s,r)=>s+(r.amt||0),0);
    const hasOv=inv.some(r=>r.daysOverdue>0&&r.status!=='Paid');
    const counts={};
    inv.forEach(r=>{
      const ov=r.daysOverdue>0&&r.status!=='Paid';
      const c=ov?'dD':r.status==='Ready to Pay'?'dR':r.type==='Credit Memo'?'dC':r.status==='Paid'?'dP':'dO';
      counts[c]=(counts[c]||0)+1;
    });
    const dots=['dD','dO','dR','dC','dP'].filter(c=>counts[c]).map(c=>`<span class="dchip ${c}">${counts[c]}</span>`).join('');
    const netStr=inv.length?`<div class="cdnet${hasOv?' ov':''}${net<0?' negnet':''}">${fmtSigned(net)}</div>`:'';
    const oc=inv.length?`onclick="dayClick(${day})"`:'';
    h+=`<div class="cd${iT?' today':''}" ${oc}><div class="cdn">${day}</div><div class="cddots">${dots}</div>${netStr}</div>`;
  }
  $('calG').innerHTML=h;
}

function saveInv(){
  if(!editId)return;
  const programInput=$('mProgram').value.trim().toUpperCase();
  const allKnown=[...new Set([...KNOWN_PROGRAMS,...ACTIVE,...PAID].map(x=>typeof x==='string'?x:x.program).filter(Boolean))];
  if(programInput && !allKnown.includes(programInput)){
    $('mProgram').classList.add('invalid');
    showToast('Unknown program code — check spelling or leave blank');
    return;
  }
  const program=programInput;
  const applyDiscChange=(row)=>{
    row.discount=editDisc;
    row.effectiveDueDate=(editDisc==='Yes'&&row.discountDate)?row.discountDate:row.dueDate;
    row.daysOverdue=calcOverdue(row.effectiveDueDate);
  };
  let savedRow=null;
  let idx=ACTIVE.findIndex(r=>r.id===editId);
  if(idx!==-1){
    ACTIVE[idx].status=editSt;ACTIVE[idx].program=program;ACTIVE[idx].flagged=editFlag;
    ACTIVE[idx].notifyEmails=Array.from($('notifyUsers').querySelectorAll('input:checked')).map(function(o){return o.value;});ACTIVE[idx].tags=editTags;
    applyDiscChange(ACTIVE[idx]);
    if(editSt==='Paid'){PAID.unshift({...ACTIVE[idx]});savedRow={...ACTIVE[idx]};ACTIVE.splice(idx,1);}
    else{savedRow=ACTIVE[idx];}
  } else {
    idx=PAID.findIndex(r=>r.id===editId);
    if(idx!==-1){PAID[idx].status=editSt;PAID[idx].program=program;PAID[idx].flagged=editFlag;PAID[idx].notifyEmails=Array.from($('notifyUsers').querySelectorAll('input:checked')).map(function(o){return o.value;});PAID[idx].tags=editTags;applyDiscChange(PAID[idx]);savedRow=PAID[idx];}
  }
  if(savedRow){
    const flagJustTurnedOn = editFlag && !originalFlag;
    if(flagJustTurnedOn) sendNotifyEmail(savedRow, 'flagged');
  }
  closeMov2();render();markDirty();
  showToast(editSt==='Paid'?'✓ Moved to Paid':'✓ Saved');
}
function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2400);
}

init();
var pendingDeepLink=null;
window.addEventListener('message', function(e){
  if(e.data && e.data.type==='credentials'){
    GH_TOKEN = e.data.token || '';
    APP_USER = e.data.user || '';
    APP_NAME = e.data.name || APP_USER;
    APP_EMAIL = e.data.email || '';
    APP_PROFILES = e.data.profiles || [];
    if(e.data.deepLinkId) pendingDeepLink=e.data.deepLinkId;
    if(GH_TOKEN) loadFromGitHub();
  }
});
if(GH_TOKEN) loadFromGitHub();

<script type="text/html" id="tpl-spr"><!DOCTYPE html>
<html lang="en">
<head>

<style>
:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--surface);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

.btn-icon:hover{background:rgba(255,255,255,.2)}.btn-icon.on{background:var(--accent)}
.mgmt-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;padding:0 12px;height:34px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:background .15s}

.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}

.no{color:var(--open)} .nr{color:var(--ready)} .nc{color:var(--credit)} .nd{color:var(--danger)}

/* PROMINENT OPEN/RESOLVED SEGMENTED CONTROL */
.seg-wrap{padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border)}
.seg{display:flex;background:var(--surface);border-radius:10px;padding:3px;gap:2px}

.seg-opt.on.seg-open{color:var(--open)}
.seg-opt.on.seg-resolved{color:var(--ready)}
.seg-opt.on.seg-both{color:var(--accent)}

.filters{background:var(--card);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.fsel{flex:1;min-width:100px;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:12px;font-weight:600;background:var(--card);color:var(--ink);cursor:pointer;outline:none;font-family:var(--font);transition:border-color .15s;height:30px}
.fsel:focus,.fsel.on{border-color:var(--accent);background:var(--adim);color:var(--accent)}
.drange{display:flex;gap:4px;align-items:center;flex:2;min-width:180px}
.drange input{flex:1;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:11px;background:var(--card);color:var(--ink);outline:none;font-family:var(--font);height:30px}
.drange input:focus{border-color:var(--accent)}
.drange span{font-size:11px;color:var(--ink3);white-space:nowrap}
.clrbtn{padding:5px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:11px;font-weight:700;background:var(--card);color:var(--ink2);cursor:pointer;font-family:var(--font);white-space:nowrap;height:30px}
.clrbtn:hover{background:var(--ddim);border-color:var(--danger);color:var(--danger)}

.chips{background:var(--card);border-bottom:1px solid var(--border);padding:5px 14px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;align-items:center}

.chip{border:1.5px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--ink2);transition:all .15s;user-select:none;line-height:1.6}

.toolbar{padding:6px 14px;display:flex;gap:8px;align-items:center;background:var(--surface)}
.sw{flex:1;position:relative}

.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:14px;pointer-events:none}
.sortsel{padding:8px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:12px;font-weight:600;background:var(--card);color:var(--ink2);cursor:pointer;outline:none;font-family:var(--font)}

.list{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.card{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:13px 14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.card.sOpen::before{background:var(--open)}
.card.sResolved::before{background:var(--ready)}
.card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(26,31,46,.1);transform:translateY(-1px)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.flag-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-right:6px;flex-shrink:0;vertical-align:middle}
.amt-wrap{display:flex;align-items:center}
.cid{font-family:var(--mono);font-size:12px;font-weight:700}
.camt{font-size:15px;font-weight:800;white-space:nowrap}
.csup{font-size:12px;color:var(--ink2);margin-bottom:5px;font-weight:500}
.cmeta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bO{background:var(--odim);color:#92400e}
.bR{background:var(--rdim);color:#065f46}
.bManual{background:var(--cdim);color:#5b21b6}
.cbuy{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink3)}
.empty{text-align:center;padding:48px 24px;color:var(--ink3)}
.empty .ei{font-size:40px;margin-bottom:12px}
.empty h3{font-size:15px;color:var(--ink2);margin-bottom:6px}

/* CALENDAR */
.calview{padding:12px 14px}
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.caltitle{font-size:16px;font-weight:700}
.calnav{background:none;border:1.5px solid var(--border);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;color:var(--ink2);display:flex;align-items:center;justify-content:center;transition:all .15s}

.cd:not(.om):hover{border-color:var(--accent)}

.cddots{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px}
.dchip{display:inline-flex;align-items:center;justify-content:center;min-width:14px;height:14px;padding:0 3px;border-radius:7px;font-size:9px;font-weight:700;color:#fff;line-height:1}
.dO{background:var(--open)} .dR{background:var(--ready)}
.cdnet{font-size:9px;font-weight:800;color:var(--ink2);line-height:1.2;margin-top:1px}

/* DAY POPUP */
.dpop-ov{position:fixed;inset:0;background:rgba(26,31,46,.45);z-index:150;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .15s}

.mx:hover{background:var(--ddim);color:var(--danger)}

.apdf{background:var(--accent);color:#fff}.apdf:hover{background:#1d4ed8}

.adoc{background:var(--surface);color:var(--ink);border:1.5px solid var(--border)}.adoc:hover{background:var(--adim);border-color:var(--accent);color:var(--accent)}

.stopts{display:flex;gap:6px}
.stopt{flex:1;padding:9px 6px;border-radius:var(--rs);border:2px solid var(--border);text-align:center;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;background:var(--card);color:var(--ink2);user-select:none}
.stopt:hover{border-color:var(--ink2)}

.note-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600}
.note-text{color:var(--ink)}
.note-empty{color:var(--muted);font-size:12px;font-style:italic;padding:8px 0}
.note-add{display:flex;gap:6px;align-items:flex-start}
.note-add .ntxt{flex:1;min-height:44px}
.note-add button{flex:0 0 auto;padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer}
.savebtn{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;font-family:var(--font);margin-top:14px}
.savebtn:hover{background:var(--accent)}
.flag-btn-on{background:var(--danger)!important;color:#fff!important}
.notify-row{display:flex;flex-direction:column;gap:6px}
.notify-multi{width:100%;padding:4px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:var(--font);color:var(--ink);background:var(--card);max-height:160px;overflow-y:auto}
.notify-opt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:13px;cursor:pointer}

.tag-sec{margin:10px 0}

.tag-select-list{max-height:160px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px}
.tag-select-item{padding:4px 10px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;opacity:.85;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 50%,calc(100% - 6px) 100%,0 100%,6px 50%);padding-left:10px;padding-right:12px}
.tag-select-item:hover{opacity:1}
.tag-create-form{display:flex;flex-direction:column;gap:10px}
.tag-create-form input[type=text]{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:var(--font);outline:none;color:var(--ink);background:var(--card)}
.tag-create-form input[type=text]:focus{border-color:var(--accent)}
.tag-create-form input[type=color]{width:100%;height:36px;border:none;cursor:pointer;border-radius:var(--rs)}
.tag-create-form button{padding:8px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}

/* MANAGEMENT PANEL */

.mgmt-body{padding:16px 18px;display:flex;flex-direction:column;gap:16px}
.mgmt-section{background:var(--surface);border-radius:var(--r);padding:14px 16px}

.drop-zone{border:2px dashed var(--border);border-radius:var(--rs);padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--adim)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:24px;margin-bottom:6px}
.drop-label{font-size:13px;font-weight:600;color:var(--ink2)}
.drop-sub{font-size:11px;color:var(--ink3);margin-top:3px}
.drop-zone.loaded{border-color:var(--ready);background:var(--rdim)}
.drop-zone.loaded .drop-label{color:#065f46}
.file-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.run-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .15s}
.run-btn:hover{background:#1d4ed8}
.run-btn:disabled{background:var(--ink3);cursor:not-allowed}
.run-btn.danger{background:var(--danger)}.run-btn.danger:hover{background:#dc2626}
.run-btn.success{background:var(--ready)}.run-btn.success:hover{background:#059669}
.log-box{background:var(--ink);color:#a3e635;font-family:var(--mono);font-size:11px;border-radius:var(--rs);padding:10px 12px;min-height:60px;max-height:160px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;margin-top:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:400;transition:transform .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

<script>
const FLOW_URL = 'https://default9f4f877906c047fdbc57f13ddf261c.04.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/bb65c0fcfbc54028964505231b9b385e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=mxNhYPqhXIJmjvV7zQ9ZtvMsWtLTMhaRUkHKoJMKRVU';
const PDF_DIR = '\\\\fermi\\shared\\Accounting - Controller\\Shane-Accounting\\SPR Invoices\\';
const pdfUrl=id=>'file://' + PDF_DIR.replace(/\\/g,'/').replace(/^\/\//,'//') + encodeURIComponent(id) + '.pdf';
const pdfWindowsPath=id=>PDF_DIR + id + '.pdf';
let currentPdfPath='';
function copyPdfPath(){
  navigator.clipboard.writeText(currentPdfPath).then(()=>{
    showToast('Path copied — paste into File Explorer');
  }).catch(()=>{ showToast('Copy failed — path: '+currentPdfPath); });
}
let originalFlag=false;
function sendNotifyEmail(row, triggerType){
  const emails=(row.notifyEmails||[]).concat([row.notifyEmail1,row.notifyEmail2]).filter(Boolean);
  var unique=[]; emails.forEach(function(e){if(unique.indexOf(e)===-1)unique.push(e);});
  if(!unique.length) return;
  const payload = {
    to: unique.join(';'),
    buyerCode: row.custNum||'',
    invoiceId: row.id,
    pdfPath: pdfWindowsPath(row.id),
    note: (Array.isArray(row.notes) && row.notes.length) ? row.notes[row.notes.length-1].text + ' —' + row.notes[row.notes.length-1].by : '(no note)',
    trigger: triggerType,
    app: 'SPR',
    link: 'https://shanes-wist.github.io/AP-Dashboard/#app=spr&id=' + row.id
  };
  fetch(FLOW_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(()=>{
    showToast('📧 Notification sent');
  }).catch(e=>{
    console.log('Notify failed:', e);
    showToast('Notify failed — check connection');
  });
}

// ── GITHUB DATA STORE ────────────────────────────────────────────
const GH_USER  = 'ShaneS-Wist';
const GH_REPO  = 'Spr-data';
const GH_FILE  = 'spr_invoices.json';
let GH_TOKEN = ''; // set by login gate
let APP_USER = ''; // GitHub username, set by login gate
let APP_NAME = ''; // Display name from profiles repo
let APP_EMAIL = ''; // Email from profiles repo
let APP_PROFILES = [];
const GH_API   = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

let ghSha = null;
let baseSnap = {}; // id -> canonical JSON of each record as last loaded/saved (merge baseline)

function canon(o){
  if(o===null||typeof o!=='object') return JSON.stringify(o);
  if(Array.isArray(o)) return '['+o.map(canon).join(',')+']';
  return '{'+Object.keys(o).sort().map(k=>JSON.stringify(k)+':'+canon(o[k])).join(',')+'}';
}
function snapshot(records){ const m={}; records.forEach(r=>{ if(r && r.id!=null) m[String(r.id)]=canon(r); }); return m; }

async function ghFetch(){
  const metaResp = await fetch(GH_API, { cache:'no-store', headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3+json' } });
  if(!metaResp.ok) throw new Error(`GitHub ${metaResp.status}: ${await metaResp.text()}`);
  const meta = await metaResp.json();
  let content;
  if(meta.content && meta.encoding==='base64'){
    content = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g,'')))));
  } else {
    const raw = await fetch(GH_API, { cache:'no-store', headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3.raw' } });
    if(!raw.ok) throw new Error(`GitHub raw ${raw.status}: ${await raw.text()}`);
    content = JSON.parse(await raw.text());
  }
  return { sha: meta.sha, content };
}
async function ghPut(jsonStr, sha){
  const content = btoa(unescape(encodeURIComponent(jsonStr)));
  return fetch(GH_API, {
    method:'PUT',
    headers:{ 'Authorization':`token ${GH_TOKEN}`, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' },
    body: JSON.stringify({ message:`Update SPR exceptions ${new Date().toISOString().split('T')[0]}`, content, sha })
  });
}
// ── NOTE LOG HELPERS ─────────────────────────────────────────────
function ensureNoteArray(record){
  if(!Array.isArray(record.notes)) record.notes = [];
}
function renderNoteLog(notes){
  const el=$('noteLog'); if(!el)return;
  const arr=Array.isArray(notes)?notes:[];
  if(!arr.length){ el.innerHTML='<div class="note-empty">No notes yet</div>'; return; }
  const sorted=[...arr].sort((a,b)=>new Date(b.at)-new Date(a.at));
  el.innerHTML=sorted.map(n=>{
    const d=new Date(n.at);
    const ds=isNaN(d)?n.at:d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const who=n.by||'Unknown';
    const txt=(n.text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="note-entry"><div class="note-meta"><span>${who}</span><span>${ds}</span></div><div class="note-text">${txt}</div></div>`;
  }).join('');
}

// ── TAGS ──────────────────────────────────────────────────────────
let editTags=[];
function getAllRecords(){return RECORDS;}
function getAppTags(){
  var all=getAllRecords(),map={};
  all.forEach(function(r){(r.tags||[]).forEach(function(t){map[t.name]=t.color;});});
  return Object.keys(map).map(function(n){return {name:n,color:map[n]};});
}
function renderTagPills(){
  $('tagPills').innerHTML=editTags.map(function(t,i){
    return '<span class="tag-pill" style="background:'+t.color+'">'+t.name+'<span class="tag-x" onclick="removeEditTag('+i+')">&times;</span></span>';
  }).join('');
}
function removeEditTag(i){editTags.splice(i,1);renderTagPills();}
function openTagPop(){switchTagTab('select');$('tagPopBg').classList.add('on');$('tagPop').classList.add('on');}
function closeTagPop(){$('tagPopBg').classList.remove('on');$('tagPop').classList.remove('on');}
function switchTagTab(which){
  $('tagTabSel').classList.toggle('on',which==='select');
  $('tagTabNew').classList.toggle('on',which==='create');
  $('tagSelView').style.display=which==='select'?'':'none';
  $('tagNewView').style.display=which==='create'?'':'none';
  if(which==='select') populateTagSelect();
}
function populateTagSelect(){
  var existing=getAppTags();
  var current=editTags.map(function(t){return t.name;});
  var available=existing.filter(function(t){return current.indexOf(t.name)===-1;});
  if(!available.length){$('tagSelView').innerHTML='<div style="color:var(--ink3);font-size:12px;padding:8px">No other tags in use. Create one!</div>';return;}
  $('tagSelView').innerHTML='';
  available.forEach(function(t){
    var el=document.createElement('span');
    el.className='tag-select-item';el.style.background=t.color;el.textContent=t.name;
    el.onclick=function(){selectTag(t.name,t.color);};
    $('tagSelView').appendChild(el);
  });
}
function selectTag(name,color){editTags.push({name:name,color:color});renderTagPills();closeTagPop();}
function createAndAddTag(){
  var name=$('tagNewName').value.trim();
  var color=$('tagNewColor').value;
  if(!name)return;
  if(editTags.some(function(t){return t.name===name;}))return;
  editTags.push({name:name,color:color});
  renderTagPills();closeTagPop();
  $('tagNewName').value='';
}
function renderTagBadges(tags){
  if(!tags||!tags.length)return '';

function mergeNotes(base, ours, theirs){
  const key=e=>`${e.by}|${e.at}|${e.text}`;
  const seen=new Set();
  const all=[...(base||[]),...(ours||[]),...(theirs||[])];
  const merged=[];
  all.forEach(e=>{ const k=key(e); if(!seen.has(k)){seen.add(k);merged.push(e);} });
  return merged.sort((a,b)=>new Date(a.at)-new Date(b.at));
}

let hasUnsavedChanges = false;

async function loadFromGitHub() {
  showBanner('Loading invoices…', 'info');
  try {
    // First call: get metadata (sha) — content may be empty for files >1MB, that's expected
    const metaResp = await fetch(GH_API, { headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } });
    if (!metaResp.ok) throw new Error(`GitHub ${metaResp.status}: ${await metaResp.text()}`);
    const meta = await metaResp.json();
    ghSha = meta.sha;

    let content;
    if (meta.content && meta.encoding === 'base64') {
      // File is under 1MB — standard base64 content is usable directly
      content = JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, '')))));
    } else {
      // File is over 1MB — GitHub omits content here, fetch raw instead
      // cache: 'no-store' prevents the browser reusing the first response (different Accept header, same URL)
      const rawResp = await fetch(GH_API, { cache: 'no-store', headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3.raw' } });
      if (!rawResp.ok) throw new Error(`GitHub raw ${rawResp.status}: ${await rawResp.text()}`);
      const rawText = await rawResp.text();
      content = JSON.parse(rawText);
    }

    RECORDS = content.records || [];
    if (RECORDS.length === 0 && content.records === undefined) {
      console.error('GitHub response did not contain records. Keys found:', Object.keys(content || {}));
      console.error('Raw content sample:', JSON.stringify(content).substring(0, 300));
      throw new Error('Fetched data had no "records" field — open browser console (F12) for details');
    }
    refreshFilterOptions();
    render();
    baseSnap = snapshot(RECORDS);
    showBanner(`Loaded ${RECORDS.length} records`, 'ok');
    if(pendingDeepLink){var _dl=pendingDeepLink;pendingDeepLink=null;setTimeout(function(){openM(_dl);},150);}
  } catch(e) {
    showBanner('Load failed: ' + e.message, 'err');
  }
}

async function saveToGitHub() {
  showBanner('Saving…', 'info');
  try {
    const ours = {};
    RECORDS.forEach(r => { if (r && r.id != null) ours[String(r.id)] = r; });

    for (let attempt = 0; attempt < 3; attempt++) {
      const { sha, content } = await ghFetch();
      const theirs = {};
      (content.records || []).forEach(r => { if (r && r.id != null) theirs[String(r.id)] = r; });

      const ids = new Set([...Object.keys(baseSnap), ...Object.keys(ours), ...Object.keys(theirs)]);
      const merged = [];
      const conflicts = [];
      ids.forEach(id => {
        const b = baseSnap[id];
        const o = ours[id], t = theirs[id];
        const oc = o ? canon(o) : undefined;
        const tc = t ? canon(t) : undefined;
        const ourChanged   = oc !== b;
        const theirChanged = tc !== b;
        if (!ourChanged)   { if (t) merged.push(t); return; }
        if (!theirChanged) { if (o) merged.push(o); return; }
        if (oc === tc)     { if (o) merged.push(o); return; }
        if (o && t) {
          const oRest = {...o, notes: []}; const tRest = {...t, notes: []};
          if (canon(oRest) === canon(tRest)) {
            const bNotes = b ? (JSON.parse(b).notes || []) : [];
            const result = {...o, notes: mergeNotes(bNotes, o.notes||[], t.notes||[])};
            merged.push(result); return;
          }
        }
        conflicts.push(id);
      });

      if (conflicts.length) {
        const list = conflicts.slice(0, 8).join(', ') + (conflicts.length > 8 ? '…' : '');
        showBanner(`Save blocked — ${conflicts.length} invoice(s) were changed by someone else since you loaded: ${list}. Reload to pull the latest, then re-apply your edits.`, 'err');
        return;
      }

      const payload = JSON.stringify({ records: merged });
      const put = await ghPut(payload, sha);
      if (put.status === 409) continue;
      if (!put.ok) throw new Error(`GitHub ${put.status}: ${await put.text()}`);

      const result = await put.json();
      ghSha = result.content.sha;
      RECORDS = merged;
      baseSnap = snapshot(RECORDS);
      hasUnsavedChanges = false;
      updateSaveBtn();
      refreshFilterOptions(); render();
      showBanner('Saved ✓', 'ok');
      return;
    }
    showBanner('Save failed: too many concurrent edits in a row — please try again.', 'err');
  } catch(e) {
    showBanner('Save failed: ' + e.message, 'err');
  }
}
function showBanner(msg, type) {
  const el = document.getElementById('ghBanner');
  if(!el) return;
  el.textContent = msg;
  el.style.background = type === 'ok' ? 'var(--ready)' : type === 'err' ? 'var(--danger)' : 'var(--accent)';
  el.style.display = 'block';
  if (type === 'ok') setTimeout(() => { el.style.display = 'none'; }, 3000);
}
function markDirty(){ hasUnsavedChanges = true; updateSaveBtn(); }
function updateSaveBtn(){
  const btn = document.getElementById('ghSaveBtn');
  if (!btn) return;
  btn.style.background = hasUnsavedChanges ? 'var(--open)' : 'rgba(255,255,255,.15)';
  btn.title = hasUnsavedChanges ? 'Unsaved changes — click to save' : 'All saved';
}

const fmtSigned=n=>n==null?'—':(n<0?'-':'')+'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD=s=>{if(!s)return'—';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=c;
    }
    vals.push(cur.trim());
    const row={};
    headers.forEach((h,i)=>row[h]=vals[i]||'');
    return row;
  });
}
function parseMoney(v){
  if(v===null||v===undefined||v==='')return 0;
  const s=String(v).replace(/[\$,\s()]/g,'');
  const neg=String(v).trim().startsWith('(')||String(v).trim().startsWith('-');
  const n=parseFloat(s.replace(/^-/,''))||0;
  return neg?-n:n;
}
function normalizeDate(s){
  if(!s)return'';
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)return`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
  if(s.match(/^\d{4}-\d{2}-\d{2}$/))return s;
  return s;
}
function cleanNumStr(v){
  if(!v)return'';
  const f=parseFloat(v);
  if(!isNaN(f)&&Number.isInteger(f))return String(f);
  return String(v).trim();
}

let pendingSpr=null,pendingS2k=null;

function checkImportReady(){ $('runImportBtn').disabled=!pendingSpr; }

function runImport(){
  const logEl=$('importLog'); logEl.textContent='';
  let added=0,updated=0,resolved=0,skippedVerified=0,skippedDupe=0;

  // Build S2k lookup keyed by Vendor Invoice (any vendor counts)
  const s2kMap={};
  if(pendingS2k){
    pendingS2k.forEach(row=>{
      const inv=(row['Vendor Invoice']||'').trim();
      if(!inv)return;
      s2kMap[inv]={
        vendor:(row.Vendor||'').trim(),
        paymentDate:normalizeDate(row['Payment Date']||''),
        paymentAmount:parseMoney(row['Payment Amount']),
        po:cleanNumStr(row['PO Number']),
        voucher:cleanNumStr(row.Voucher),
      };
    });
    log('importLog',`Loaded ${Object.keys(s2kMap).length} S2k records for matching`);
  }

  const existingMap={};
  RECORDS.forEach(r=>existingMap[r.id]=r);

  if(pendingSpr){
    const seen=new Set();
    pendingSpr.forEach(row=>{
      const inv=(row['Invoice Num']||'').trim();
      if(!inv)return;
      if(seen.has(inv)){skippedDupe++;return;}
      seen.add(inv);

      const matched=s2kMap[inv];
      const fields={
        customerPO:cleanNumStr(row['Customer PO']),
        customerRef:cleanNumStr(row['Customer Reference']),
        custNum:cleanNumStr(row['Cust Num']),
        invoiceDate:normalizeDate(row['Invoice Date']||''),
        merchTotal:parseMoney(row['Inv Merch Total']),
        freight:parseMoney(row['Net Freight*']),
        fuelSurcharge:parseMoney(row['Fuel Surcharge']),
        smallOrderFee:parseMoney(row['Small Order Fee']),
        invoiceTotal:parseMoney(row['Invoice Total']),
        placedBy:(row['Placed By']||'').trim(),
      };

      if(existingMap[inv]){
        const ex=existingMap[inv];
        const wasManual=ex.resolvedMethod==='manual';
        Object.assign(ex,fields);
        if(matched){
          // A real S2k match always takes precedence, even over a prior manual verification
          ex.status='Resolved';ex.resolvedMethod='auto';ex.resolvedDate=new Date().toISOString().split('T')[0];
          ex.s2kVendor=matched.vendor;ex.paymentDate=matched.paymentDate;ex.paymentAmount=matched.paymentAmount;
          ex.s2kPO=matched.po;ex.voucher=matched.voucher;
          if(!wasManual)resolved++;
        } else if(wasManual){
          skippedVerified++; // financials refreshed above, but status/S2k fields stay as manually entered
        }
        updated++;
      } else {
        const newRec={
          id:inv,...fields,
          status:matched?'Resolved':'Open',
          resolvedMethod:matched?'auto':'',
          resolvedDate:matched?new Date().toISOString().split('T')[0]:'',
          s2kVendor:matched?matched.vendor:'',
          paymentDate:matched?matched.paymentDate:'',
          paymentAmount:matched?matched.paymentAmount:0,
          s2kPO:matched?matched.po:'',
          voucher:matched?matched.voucher:'',
          flagged:false,notes:'',
        };
        RECORDS.push(newRec);
        added++;
        if(matched)resolved++;
      }
    });
  }

  // Second pass: upgrade manually-verified records to auto-matched even if
  // they're no longer present in SPR_Import (SPR may stop listing an invoice
  // once it's been handled on their end, but a real S2k match still wins).
  let upgraded=0;
  if(pendingS2k){
    RECORDS.forEach(ex=>{
      if(ex.resolvedMethod!=='manual')return;
      const matched=s2kMap[ex.id];
      if(!matched)return;
      ex.resolvedMethod='auto';
      ex.resolvedDate=new Date().toISOString().split('T')[0];
      ex.s2kVendor=matched.vendor;
      ex.paymentDate=matched.paymentDate;
      ex.paymentAmount=matched.paymentAmount;
      ex.s2kPO=matched.po;
      ex.voucher=matched.voucher;
      upgraded++;
    });
  }

  log('importLog',`Import: ${added} added, ${updated} updated, ${resolved} newly resolved, ${upgraded} manually-verified upgraded to auto-matched, ${skippedVerified} manually-verified left as-is (no match found), ${skippedDupe} CSV dupes`);
  render();
  refreshFilterOptions();
  markDirty();
  showToast(`Import done — ${added} added, ${resolved+upgraded} resolved/upgraded`);
  log('importLog','✓ Complete. Click 💾 Save in the top bar to save to GitHub.');
}

function runPurge(){
  const today=new Date();
  // Cutoff: first day of (today's month - 3). Anything with invoiceDate before that, if Resolved, gets purged.
  const cutoff=new Date(today.getFullYear(), today.getMonth()-3, 1);
  const cutoffStr=cutoff.toISOString().split('T')[0];
  const before=RECORDS.length;
  RECORDS=RECORDS.filter(r=>{
    if(r.status!=='Resolved')return true; // never purge Open
    if(!r.invoiceDate)return true;
    return r.invoiceDate>=cutoffStr;
  });
  const removed=before-RECORDS.length;
  log('purgeLog',`Purged ${removed} resolved records with invoice date before ${cutoffStr}.\n${RECORDS.length} records remain.`);
  render();
  markDirty();
  showToast(`Purged ${removed} old records`);
}

function getFiltered(){
  let d=[...RECORDS];
  if(statusView==='Open')d=d.filter(r=>r.status==='Open');
  else if(statusView==='Resolved')d=d.filter(r=>r.status==='Resolved');
  const q=$('srch').value.toLowerCase().trim();
  if(q)d=d.filter(r=>r.id.toLowerCase().includes(q)||String(r.customerPO).toLowerCase().includes(q)||(r.placedBy||'').toLowerCase().includes(q)||(r.tags||[]).some(function(t){return t.name.toLowerCase().includes(q);}));
  if(fPlacedBy)d=d.filter(r=>r.placedBy===fPlacedBy);
  if(fFrom)d=d.filter(r=>r.invoiceDate>=fFrom);
  if(fTo)d=d.filter(r=>r.invoiceDate<=fTo);
  if(sumSt){
    if(sumSt==='manual')d=d.filter(r=>r.resolvedMethod==='manual');
    else if(sumSt==='flagged')d=d.filter(r=>r.flagged);
    else d=d.filter(r=>r.status===sumSt);
  }
  if(activeChips.size>0){
    d=d.filter(r=>{
      if(activeChips.has('flagged')&&r.flagged)return true;
      if(activeChips.has('manual')&&r.resolvedMethod==='manual')return true;
      if(activeChips.has('tagged')&&(r.tags||[]).length>0)return true;
      return false;
    });
  }
  const s=$('srt').value;
  if(s==='inv')d.sort((a,b)=>a.invoiceDate.localeCompare(b.invoiceDate));
  if(s==='inv-')d.sort((a,b)=>b.invoiceDate.localeCompare(a.invoiceDate));
  if(s==='tag')d.sort((a,b)=>{var at=(a.tags||[]).map(function(t){return t.name;}).sort().join(',');var bt=(b.tags||[]).map(function(t){return t.name;}).sort().join(',');if(!at&&bt)return 1;if(at&&!bt)return -1;return at.localeCompare(bt);});
  return d;
}

function renderCal(){
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  $('calT').textContent=`${MN[calM]} ${calY}`;
  const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let h=DN.map(d=>`<div class="cdh">${d}</div>`).join('');
  const first=new Date(calY,calM,1).getDay(),total=new Date(calY,calM+1,0).getDate();
  const td=new Date();
  const byDay={};
  getFiltered().forEach(r=>{
    const d=new Date(r.invoiceDate+'T00:00:00');
    if(d.getFullYear()===calY&&d.getMonth()===calM){
      const day=d.getDate();if(!byDay[day])byDay[day]=[];byDay[day].push(r);
    }
  });
  for(let i=0;i<first;i++)h+='<div class="cd om"></div>';
  for(let day=1;day<=total;day++){
    const iT=td.getFullYear()===calY&&td.getMonth()===calM&&td.getDate()===day;
    const inv=byDay[day]||[];
    const total_=inv.reduce((s,r)=>s+(r.invoiceTotal||0),0);
    const openCount=inv.filter(r=>r.status==='Open').length;
    const readyCount=inv.length-openCount;
    const dots=[openCount?`<span class="dchip dO">${openCount}</span>`:'',readyCount?`<span class="dchip dR">${readyCount}</span>`:''].join('');
    const totStr=inv.length?`<div class="cdnet">${fmt(total_)}</div>`:'';
    const oc=inv.length?`onclick="dayClick(${day})"`:'';
    h+=`<div class="cd${iT?' today':''}" ${oc}><div class="cdn">${day}</div><div class="cddots">${dots}</div>${totStr}</div>`;
  }
  $('calG').innerHTML=h;
}
function dayClick(day){
  const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const inv=getFiltered().filter(r=>r.invoiceDate===ds);
  if(!inv.length)return;
  if(inv.length===1){openM(inv[0].id);return;}
  const total_=inv.reduce((s,r)=>s+(r.invoiceTotal||0),0);
  const d=new Date(ds+'T00:00:00');
  $('dpopT').textContent=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  $('dpopS').textContent=`${inv.length} invoices`;
  $('dpopN').textContent=fmt(total_);
  inv.sort(function(a,b){return (a.custNum||'').localeCompare(b.custNum||'');});
  var dpH='',lastCust='',gT=0;
  inv.forEach(function(r){
    var cust=r.custNum||'\u2014';
    if(cust!==lastCust){
      if(lastCust)dpH+='<div class="dpop-subtotal"><span class="sub-label">Subtotal</span><span>'+fmt(gT)+'</span></div>';
      dpH+='<div class="dpop-group-hdr">Cust '+cust+'</div>';
      lastCust=cust;gT=0;
    }
    gT+=(r.invoiceTotal||0);
    var badge=r.status==='Open'?'<span class="badge bO">Open</span>':(r.resolvedMethod==='manual'?'<span class="badge bManual">\u2713 Verified</span>':'<span class="badge bR">Resolved</span>');
    dpH+='<div class="dpop-item" onclick="openedFromDpop=true;$(\'dpopOv\').classList.remove(\'on\');openM(\''+r.id+'\')"><div><div class="dpi-id">'+r.id+'</div><div class="dpi-sup">PO '+(r.customerPO||'\u2014')+'</div>'+badge+'</div><div><div class="dpi-amt">'+renderTagBadges(r.tags)+(r.flagged?'<span class="flag-dot"></span>':'')+fmt(r.invoiceTotal)+'</div><div class="dpi-buy">'+(r.placedBy||'\u2014')+'</div></div></div>';
  });
  if(lastCust)dpH+='<div class="dpop-subtotal"><span class="sub-label">Subtotal</span><span>'+fmt(gT)+'</span></div>';
  $('dpopL').innerHTML=dpH;
  $('dpopOv').classList.add('on');
}
function closeDpop(e){if(e.target===$('dpopOv'))closeDpopNow();}
function closeDpopNow(){$('dpopOv').classList.remove('on');}
let openedFromDpop=false;

// ── MODAL ─────────────────────────────────────────────────────────
function openM(id){
  const r=RECORDS.find(x=>x.id===id);if(!r)return;
  editId=id;editFlag=!!r.flagged;
  originalFlag=!!r.flagged;
  editTags=(r.tags||[]).map(function(t){return {name:t.name,color:t.color};});

  $('mId').textContent=r.id;
  $('mSup').textContent=`PO ${r.customerPO||'—'}`;
  $('mAmt').textContent=fmt(r.invoiceTotal);
  currentPdfPath=pdfWindowsPath(r.id);
  $('mIDate').textContent=fmtD(r.invoiceDate);
  $('mPO').textContent=r.customerPO||'—';
  $('mRef').textContent=r.customerRef||'—';
  $('mCustNum').textContent=r.custNum||'—';
  $('mPlacedBy').textContent=r.placedBy||'—';
  $('mStatusDisplay').textContent=r.status==='Open'?'Open':(r.resolvedMethod==='manual'?'Resolved (Manually Verified)':'Resolved (Auto-matched)');
  $('mMerch').textContent=fmt(r.merchTotal);
  $('mFreight').textContent=fmt(r.freight);
  $('mFuel').textContent=fmt(r.fuelSurcharge);
  $('mSmallFee').textContent=fmt(r.smallOrderFee);
  $('mTotal').textContent=fmt(r.invoiceTotal);

  $('mS2kVendor').textContent=r.s2kVendor||'—';
  $('mPayDate').value=r.paymentDate||'';
  $('mPayAmt').value=r.paymentAmount||'';
  $('mS2kPO').value=r.s2kPO||'';
  $('mVoucher').value=r.voucher||'';

  $('verifyBtn').style.display=r.status==='Open'?'':'none';

  $('flagBtn').classList.toggle('flag-btn-on',editFlag);
  $('flagBtn').textContent=editFlag?'🔴 Needs Attention':'Needs Attention';
  populateNotifyDropdowns();
  var _emails=[r.notifyEmail1,r.notifyEmail2].concat(r.notifyEmails||[]).filter(Boolean);Array.from($('notifyUsers').querySelectorAll('input')).forEach(function(o){o.checked=_emails.indexOf(o.value)!==-1;});
  renderTagPills();

  ensureNoteArray(r);
  renderNoteLog(r.notes);
  $('mNotes').value='';
  $('mov').classList.add('on');document.body.style.overflow='hidden';
}
function closeMov(e){if(e.target===$('mov'))closeMov2();}
function closeMov2(){$('mov').classList.remove('on');document.body.style.overflow='';editId=null;if(openedFromDpop){openedFromDpop=false;$('dpopOv').classList.add('on');}}

function toggleFlag(){
  editFlag=!editFlag;
  $('flagBtn').classList.toggle('flag-btn-on',editFlag);
  $('flagBtn').textContent=editFlag?'🔴 Needs Attention':'Needs Attention';
}
function populateNotifyDropdowns(){
  var opts=APP_PROFILES.map(function(p){return '<label class="notify-opt"><input type="checkbox" value="'+p.email+'">'+p.name+'</label>';}).join('');
  $('notifyUsers').innerHTML=opts;
}

function markVerified(){
  if(!editId)return;
  const idx=RECORDS.findIndex(r=>r.id===editId);
  if(idx===-1)return;
  RECORDS[idx].status='Resolved';
  RECORDS[idx].resolvedMethod='manual';
  RECORDS[idx].resolvedDate=new Date().toISOString().split('T')[0];
  RECORDS[idx].s2kVendor=$('mS2kVendor').textContent==='—'?'':$('mS2kVendor').textContent;
  RECORDS[idx].paymentDate=$('mPayDate').value;
  RECORDS[idx].paymentAmount=parseFloat($('mPayAmt').value)||0;
  RECORDS[idx].s2kPO=$('mS2kPO').value;
  RECORDS[idx].voucher=$('mVoucher').value;
  closeMov2();render();markDirty();
  showToast('✓ Marked as Verified');
}

function saveInv(){
  if(!editId)return;
  const idx=RECORDS.findIndex(r=>r.id===editId);
  if(idx===-1)return;
  RECORDS[idx].flagged=editFlag;
  RECORDS[idx].notifyEmails=Array.from($('notifyUsers').querySelectorAll('input:checked')).map(function(o){return o.value;});
  RECORDS[idx].tags=editTags;
  // Allow editing S2k fields even after resolution (per requirement)
  if(RECORDS[idx].status==='Resolved'){
    RECORDS[idx].paymentDate=$('mPayDate').value;
    RECORDS[idx].paymentAmount=parseFloat($('mPayAmt').value)||0;
    RECORDS[idx].s2kPO=$('mS2kPO').value;
    RECORDS[idx].voucher=$('mVoucher').value;
  }
  const flagJustTurnedOn = editFlag && !originalFlag;
  if(flagJustTurnedOn) sendNotifyEmail(RECORDS[idx], 'flagged');
  closeMov2();render();markDirty();
  showToast('✓ Saved');
}

function showToast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ── INIT ──────────────────────────────────────────────────────────
refreshFilterOptions();
render();
var pendingDeepLink=null;
window.addEventListener('message', function(e){
  if(e.data && e.data.type==='credentials'){
    GH_TOKEN = e.data.token || '';
    APP_USER = e.data.user || '';
    APP_NAME = e.data.name || APP_USER;
    APP_EMAIL = e.data.email || '';
    APP_PROFILES = e.data.profiles || [];
    if(e.data.deepLinkId) pendingDeepLink=e.data.deepLinkId;
    if(GH_TOKEN) loadFromGitHub();
  }
});
if(GH_TOKEN) loadFromGitHub();

</script>

<script>
  let appToken = '';
  let appUser  = '';
  let appName  = '';
  let appEmail = '';
  let appProfiles = [];

  // Profile repo: maps token hashes to display names + emails
  const PROFILE_OWNER = 'ShaneS-Wist';
  const PROFILE_REPO  = 'user-profiles';
  const PROFILE_PATH  = 'profiles.json';

  // SHA-256 hash (hex) of a string — used to identify tokens without storing them
  async function sha256(str) {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function fetchProfiles(token) {
    try {
      const url = `https://api.github.com/repos/${PROFILE_OWNER}/${PROFILE_REPO}/contents/${PROFILE_PATH}`;
      const resp = await fetch(url, {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!resp.ok) return [];
      const meta = await resp.json();
      if (meta.content && meta.encoding === 'base64') {
        return JSON.parse(decodeURIComponent(escape(atob(meta.content.replace(/\n/g, '')))));
      }
      return [];
    } catch(e) { console.log('Profile fetch failed:', e); return []; }
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginErr');
    const tokenInput = document.getElementById('loginToken');
    const userInput  = document.getElementById('loginUser');
    btn.disabled = true; btn.textContent = 'Verifying…';
    err.style.display = 'none';
    try {
      const token = tokenInput.value.trim();
      // Validate the token against GitHub
      const resp = await fetch('https://api.github.com/user', {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!resp.ok) throw new Error('Invalid token (HTTP ' + resp.status + ')');
      const gh = await resp.json();
      const ghLogin = gh.login || userInput.value.trim() || 'Unknown';

      // Hash the token and look up the user profile
      const tokenHash = await sha256(token);
      const profiles = await fetchProfiles(token);
      const profile = profiles.find(p => p.tokenHash === tokenHash);

      appToken = token;
      appUser  = ghLogin;
      appProfiles = profiles;
      appName  = profile ? profile.name : ghLogin;
      appEmail = profile ? (profile.email || '') : '';

      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('dashApp').classList.add('on');
      document.getElementById('userLabel').textContent = appName;
      showApp(deepApp||'isg');
    } catch(ex) {
      err.textContent = ex.message;
      err.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  });

  var deepApp=null,deepId=null;
  (function(){var h=location.hash.slice(1);if(!h)return;var p=new URLSearchParams(h);deepApp=(p.get('app')||'').toLowerCase()||null;deepId=p.get('id')||null;})();

  const frames = {};
  function showApp(key) {
    document.querySelectorAll('.dtab').forEach(b => b.classList.toggle('on', b.dataset.app === key));
    if (!frames[key]) {
      const tpl = document.getElementById('tpl-' + key);
      const html = tpl.textContent.split('@@CLOSE_SCRIPT@@').join('</scr' + 'ipt>');
      const f = document.createElement('iframe');
      f.className = 'dframe';
      f.setAttribute('title', key);
      f.srcdoc = html;
      f.addEventListener('load', function() {
        var _dlid=(key===deepApp)?deepId:null;
        f.contentWindow.postMessage({ type: 'credentials', token: appToken, user: appUser, name: appName, email: appEmail, profiles: appProfiles, deepLinkId: _dlid }, '*');
        if(_dlid){deepApp=null;deepId=null;history.replaceState(null,'',location.pathname);}
      });
      document.getElementById('stage').appendChild(f);
      frames[key] = f;
    } else {
      frames[key].contentWindow.postMessage({ type: 'credentials', token: appToken, user: appUser, name: appName, email: appEmail, profiles: appProfiles, deepLinkId: (key===deepApp)?deepId:null }, '*');
      if(key===deepApp){deepApp=null;deepId=null;history.replaceState(null,'',location.pathname);}
    }
    Object.keys(frames).forEach(k => frames[k].classList.toggle('on', k === key));
  }
</script>
